<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>R32 Basketball Stats</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#071126">
<style>
:root{--bg:#06101f;--panel:rgba(13,23,43,.86);--panel2:rgba(20,32,59,.88);--line:rgba(255,255,255,.10);--txt:#f8fafc;--muted:#9ca3af;--orange:#f97316;--purple:#b65cff;--green:#22c55e;--red:#ef4444;--yellow:#facc15;--radius:20px;--shadow:0 18px 50px rgba(0,0,0,.35)}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at 25% -10%,rgba(139,92,246,.28),transparent 32%),linear-gradient(180deg,#071126,#020617 62%);color:var(--txt);min-height:100vh}.app-bg:before{content:"";position:fixed;inset:0;background:url('assets/r32-brand.png') center 2vh/820px auto no-repeat;opacity:.16;filter:saturate(1.1);pointer-events:none}.app{position:relative;max-width:1400px;margin:0 auto;padding:18px 18px 96px}.layout{display:grid;grid-template-columns:260px 1fr;gap:20px}.sidebar{position:sticky;top:18px;height:calc(100vh - 36px);border:1px solid var(--line);background:linear-gradient(180deg,rgba(10,20,38,.92),rgba(7,17,38,.72));border-radius:28px;padding:18px;box-shadow:var(--shadow);overflow:hidden}.brand-art{height:175px;background:url('assets/r32-brand.png') center/cover no-repeat;border-radius:24px;margin-bottom:12px;filter:drop-shadow(0 12px 30px rgba(0,0,0,.45))}.brand h1{font-size:20px;margin:0}.brand p{font-size:12px;color:var(--muted);margin:4px 0 18px}.nav{display:grid;gap:10px}.nav button,.tabbar button{border:0;background:rgba(255,255,255,.06);color:var(--txt);padding:13px 14px;border-radius:16px;text-align:left;font-weight:800}.nav button.active,.tabbar button.active{background:linear-gradient(135deg,var(--purple),var(--orange));}.content{min-width:0}.mobile-hero{display:none}.topline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:12px}.btn{border:0;border-radius:15px;background:linear-gradient(135deg,var(--purple),var(--orange));color:#fff;font-weight:900;padding:12px 16px;box-shadow:0 10px 24px rgba(249,115,22,.22)}.btn.ghost{background:rgba(255,255,255,.08);box-shadow:none}.btn.danger{background:linear-gradient(135deg,#ef4444,#f97316)}.btn.small{padding:8px 10px;border-radius:12px;font-size:12px}.card{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(12px);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}.grid{display:grid;gap:12px}.cols3{grid-template-columns:repeat(3,1fr)}.cols2{grid-template-columns:repeat(2,1fr)}.stat-card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:18px;padding:13px}.stat-label{font-size:12px;color:var(--muted);font-weight:900}.stat-value{font-size:25px;font-weight:1000;margin-top:3px}.accent{color:var(--purple)!important}.white{color:var(--txt)!important}.stat-label.accent{color:var(--purple)!important}.key-stat .stat-label,.key-stat .stat-value{color:var(--purple)!important}.made-stat .stat-label,.made-stat .stat-value{color:var(--txt)!important}.sub{font-size:12px;color:var(--muted)}.player-title{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}.player-name{font-size:28px;font-weight:1000}.section-title{font-size:15px;font-weight:1000;margin:4px 0 12px}.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}label{font-size:12px;color:var(--muted);font-weight:900}input,select{width:100%;background:rgba(2,6,23,.72);color:var(--txt);border:1px solid var(--line);border-radius:14px;padding:12px 12px;text-align:left}input[type=date]{text-align:left;min-width:0}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.list-item{border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:18px;padding:13px;margin-bottom:10px}.game-line1,.game-line2{display:flex;justify-content:space-between;gap:8px;align-items:center}.game-line1{font-size:12px;color:var(--muted);font-weight:800}.game-line2{font-weight:1000;margin-top:5px}.result-win{color:var(--green)}.result-loss{color:var(--red)}.result-draw{color:var(--yellow)}.detail-head{border-left:4px solid var(--orange);padding-left:12px}.breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}.breakdown .box{border:1px solid var(--line);border-radius:14px;padding:10px;background:rgba(0,0,0,.18)}.breakdown .box b{display:block;font-size:18px;color:#fff}.breakdown .box span{font-size:11px;color:var(--muted)}.hidden{display:none!important}.tabbar{display:none}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#111827;color:#fff;border:1px solid var(--line);padding:12px 14px;border-radius:999px;z-index:50;opacity:0;transition:.2s}.toast.show{opacity:1}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:grid;place-items:center;z-index:40;padding:18px}.modal .card{max-width:560px;width:100%;max-height:92vh;overflow:auto}.auth-actions{display:grid;gap:8px}.pc-only{display:block}.mobile-only{display:none}
@media(max-width:800px){.app{padding:0 12px 86px}.layout{display:block}.sidebar{display:none}.mobile-hero{display:block;height:190px;margin:0 -12px 8px;background:linear-gradient(180deg,rgba(2,6,23,.25),rgba(2,6,23,.96)),url('assets/r32-brand.png') center top/135% auto no-repeat;border-bottom:1px solid var(--line)}.content{margin-top:-70px}.topline{padding:0 2px}.card{border-radius:18px;padding:14px;margin-bottom:12px}.player-name{font-size:22px}.cols3{grid-template-columns:repeat(3,1fr);gap:8px}.cols2{grid-template-columns:repeat(2,1fr)}.stat-card{padding:10px;border-radius:15px}.stat-value{font-size:21px}.form-grid{grid-template-columns:repeat(2,1fr);gap:8px}.form-grid .wide{grid-column:1/-1}.tabbar{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:0;background:rgba(3,7,18,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:7px 6px calc(7px + env(safe-area-inset-bottom));z-index:30}.tabbar button{font-size:11px;padding:9px 4px;text-align:center;border-radius:12px;background:transparent}.pc-only{display:none}.mobile-only{display:block}.breakdown{grid-template-columns:repeat(4,1fr);gap:6px}.breakdown .box{padding:8px}.breakdown .box b{font-size:16px}.login-home{width:100%}.auth-actions{margin-top:8px}.game-line1,.game-line2{font-size:12px}.game-line2{font-size:14px}.no-top-tap{height:28px}}

.stats-table{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:rgba(2,6,23,.32);margin-top:10px}.stats-row{display:grid;border-bottom:1px solid var(--line)}.stats-row:last-child{border-bottom:0}.stats-row>div,.stats-cell{padding:9px 10px;border-right:1px solid var(--line);min-width:0}.stats-row>div:last-child,.stats-cell:last-child{border-right:0}.points-row{grid-template-columns:1.05fr 1fr 1fr 1fr}.triple{grid-template-columns:1fr 1fr 1fr}.dual{grid-template-columns:1fr 1fr}.stats-row span,.stats-cell span{display:block;font-size:11px;color:var(--muted);font-weight:900}.stats-row b,.stats-cell b{display:block;font-size:20px;color:var(--txt);line-height:1.15}.stats-cell.key span,.stats-cell.key b,.stats-row .key span,.stats-row .key b{color:var(--purple)!important}.stats-cell.made span,.stats-cell.made b{color:var(--txt)!important}.break-wrap{display:grid;gap:10px}.break-card{display:grid;grid-template-columns:1.05fr repeat(5,1fr);border:1px solid var(--line);border-radius:16px;overflow:hidden;background:rgba(2,6,23,.28)}.break-card>div{padding:9px 8px;border-right:1px solid var(--line);min-width:0}.break-card>div:last-child{border-right:0}.break-card span{display:block;font-size:11px;color:var(--muted);font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.break-card b{display:block;font-size:18px;color:var(--txt)}.break-total span,.break-total b{color:var(--purple)!important}.game-detail-head{text-align:center}.game-detail-head h2{margin:8px 0;font-size:22px}
@media(max-width:800px){.points-row{grid-template-columns:1.05fr 1fr 1fr 1fr}.stats-row>div,.stats-cell{padding:8px 6px}.stats-row b,.stats-cell b{font-size:18px}.stats-row span,.stats-cell span{font-size:10px}.break-card{grid-template-columns:1fr repeat(3,1fr)}.break-card .break-item:nth-child(n+5){border-top:1px solid var(--line)}.break-card>div{padding:8px 5px}.break-card span{font-size:9px}.break-card b{font-size:16px}}


/* Ver.3.1.5 additions: category, sortable games, safer date field */
.category-tag{display:inline-flex;align-items:center;border:1px solid rgba(182,92,255,.35);color:var(--purple);border-radius:999px;padding:2px 8px;font-size:11px;font-weight:900;margin-left:6px}
.game-draggable{cursor:grab;user-select:none;touch-action:manipulation}
.game-draggable.dragging{opacity:.45;outline:2px solid var(--purple)}
.game-results{display:grid;gap:8px;margin-top:10px}
.game-results .mini-game{border:1px solid var(--line);border-radius:13px;padding:8px;background:rgba(255,255,255,.04)}
.modal input[type=date]{font-size:13px;min-width:0;max-width:100%;padding-left:10px;padding-right:8px}
@media(max-width:800px){.modal .form-grid label{min-width:0}.modal input[type=date]{font-size:12px}.category-tag{font-size:10px;padding:1px 6px}}
</style>
</head>
<body class="app-bg">
<div class="app">
  <div class="mobile-hero"></div>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand-art"></div>
      <div class="brand"><h1>R32 Basketball Stats</h1><p>数字で成長を見える化</p></div>
      <nav class="nav" id="pcNav"></nav>
    </aside>
    <main class="content">
      <div class="topline pc-only"><span class="pill" id="cloudStatus">クラウド接続確認中</span><button class="btn ghost" id="pcLoginBtn">ログイン</button></div>
      <section id="view"></section>
    </main>
  </div>
</div>
<nav class="tabbar" id="mobileNav"></nav>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyDiaAHF0iceYJNlSDKFKtHKnCETeMCW8IA",authDomain:"no32-player-stats.firebaseapp.com",projectId:"no32-player-stats",storageBucket:"no32-player-stats.firebasestorage.app",messagingSenderId:"934416639889",appId:"1:934416639889:web:cd0e319fa86c1acb3fdc30"};
const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app); await setPersistence(auth,browserLocalPersistence);
const state={user:null,tab:'home',players:[],games:[],stats:[],lastPlayerId:localStorage.getItem('r32_last_player')||'',statsMode:'game',targetId:'',selectedGameId:''};
const nav=[['home','ホーム'],['players','選手'],['games','試合'],['stats','分析'],['settings','設定']];
const $=s=>document.querySelector(s); const uid=()=>crypto.randomUUID();
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function navRender(){for(const id of ['pcNav','mobileNav']){const n=$('#'+id);n.innerHTML=nav.map(([k,v])=>`<button class="${state.tab===k?'active':''}" data-tab="${k}">${v}</button>`).join('');n.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()})}}
function sync(){onSnapshot(collection(db,'players'),s=>{state.players=s.docs.map(d=>({id:d.id,...d.data()})); if(!state.lastPlayerId&&state.players[0]) state.lastPlayerId=state.players[0].id; render()});onSnapshot(collection(db,'games'),s=>{state.games=s.docs.map(d=>({id:d.id,...d.data()})).sort(gameSort);render()});onSnapshot(collection(db,'stats'),s=>{state.stats=s.docs.map(d=>({id:d.id,...d.data()}));$('#cloudStatus').textContent='クラウド接続済み';render()})}
onAuthStateChanged(auth,u=>{state.user=u; $('#pcLoginBtn').textContent=u?'ログアウト':'ログイン'; syncOnce(); render()});let did=false;function syncOnce(){if(!did){did=true;sync()}}
$('#pcLoginBtn').onclick=()=>state.user?logout():loginModal();
function loginModal(){modal(`<h2>ログイン</h2><div class="grid"><label>メール<input id="loginEmail" autocomplete="username" type="email"></label><label>パスワード<input id="loginPass" autocomplete="current-password" type="password"></label><button class="btn" id="doLogin">ログイン</button><button class="btn ghost" id="closeModal">閉じる</button></div>`);$('#doLogin').onclick=async()=>{try{await signInWithEmailAndPassword(auth,$('#loginEmail').value,$('#loginPass').value);closeModal();toast('ログインしました')}catch(e){toast('ログイン失敗')}};$('#closeModal').onclick=closeModal}
async function logout(){await signOut(auth);toast('ログアウトしました')}
function modal(html){$('#modalRoot').innerHTML=`<div class="modal"><div class="card">${html}</div></div>`} function closeModal(){$('#modalRoot').innerHTML=''}
function requireLogin(){if(!state.user){toast('ログインが必要です');return false}return true}
function num(x){return Number(x||0)} function pct(m,a){return num(a)?(num(m)/num(a)*100).toFixed(1)+'%':'0.0%'} function one(x,g){return g?(num(x)/g).toFixed(1):'0.0'}
function player(){return state.players.find(p=>p.id===state.lastPlayerId)||state.players[0]||null}
function playerStats(pid,items=state.stats){return items.filter(s=>s.playerId===pid)}
function gameSort(a,b){const ao=Number.isFinite(num(a.order))&&num(a.order)>0?num(a.order):999999;const bo=Number.isFinite(num(b.order))&&num(b.order)>0?num(b.order):999999;if(ao!==bo)return ao-bo;return (b.date||'').localeCompare(a.date||'')}
function orderedGames(list=state.games){return [...list].sort(gameSort)}
function categoryLabel(g){return g?.category?`<span class="category-tag">${g.category}</span>`:''}
function gameResultsList(games){const arr=orderedGames(games);return arr.length?`<div class="game-results">${arr.map(g=>`<div class="mini-game"><div class="game-line1"><span>${g.date||''}</span><span>${g.tournament||''}${categoryLabel(g)}</span></div><div class="game-line2"><span>vs ${g.opponent||''}</span><span>${g.quarters||0}Q　${resultMark(g)} ${g.ownScore||0}-${g.oppScore||0}</span></div></div>`).join('')}</div>`:''}

function gameStats(gid,pid){return state.stats.find(s=>s.gameId===gid&&s.playerId===pid)}
function sumStats(items){const r={q:0,twoPa:0,twoPm:0,threePa:0,threePm:0,fta:0,ftm:0,ast:0,blk:0,passCut:0,dribbleCut:0,or:0,dr:0,passMiss:0,dribbleMiss:0,catchMiss:0,violation:0,otherTo:0};for(const s of items){const g=state.games.find(x=>x.id===s.gameId);r.q+=num(g?.quarters||s.quarters||0);for(const k in r) if(k!=='q') r[k]+=num(s[k])}return r}
function derived(r){const games=r.q/4 || 0; const fga=r.twoPa+r.threePa, fgm=r.twoPm+r.threePm, pts=r.twoPm*2+r.threePm*3+r.ftm, stl=r.passCut+r.dribbleCut, reb=r.or+r.dr, to=r.passMiss+r.dribbleMiss+r.catchMiss+r.violation+r.otherTo;return{games,fga,fgm,pts,stl,reb,to}}
function resultMark(g){if(num(g.ownScore)>num(g.oppScore))return'<b class="result-win">○</b>'; if(num(g.ownScore)<num(g.oppScore))return'<b class="result-loss">×</b>'; return'<b class="result-draw">△</b>'}
function statsGrid(r,per=true){const d=derived(r),g=per?d.games:1;return `<div class="stats-table">
  <div class="stats-row points-row">
    <div class="stats-cell key"><span>POINTS</span><b>${one(d.pts,g)}</b></div>
    <div class="stats-cell made"><span>2P成功</span><b>${one(r.twoPm,g)}</b></div>
    <div class="stats-cell made"><span>3P成功</span><b>${one(r.threePm,g)}</b></div>
    <div class="stats-cell made"><span>FT成功</span><b>${one(r.ftm,g)}</b></div>
  </div>
  <div class="stats-row triple"><div><span>2PA</span><b>${one(r.twoPa,g)}</b></div><div><span>2PM</span><b>${one(r.twoPm,g)}</b></div><div><span>2P%</span><b>${pct(r.twoPm,r.twoPa)}</b></div></div>
  <div class="stats-row triple"><div><span>3PA</span><b>${one(r.threePa,g)}</b></div><div><span>3PM</span><b>${one(r.threePm,g)}</b></div><div><span>3P%</span><b>${pct(r.threePm,r.threePa)}</b></div></div>
  <div class="stats-row triple"><div><span>FTA</span><b>${one(r.fta,g)}</b></div><div><span>FTM</span><b>${one(r.ftm,g)}</b></div><div><span>FT%</span><b>${pct(r.ftm,r.fta)}</b></div></div>
  <div class="stats-row dual"><div class="key"><span>AST</span><b>${one(r.ast,g)}</b></div><div class="key"><span>BLK</span><b>${one(r.blk,g)}</b></div></div>
</div>`}
function breakdown(title,total,arr,games){return `<div class="break-card"><div class="break-total"><span>${title}合計</span><b>${one(total,games)}</b></div>${arr.map(([lab,val])=>`<div class="break-item"><span>${lab}</span><b>${one(val,games)}</b></div>`).join('')}</div>`}
function allBreakdowns(r,d){return `<div class="card break-wrap">${breakdown('STL',d.stl,[['パスカット',r.passCut],['ドリブルカット',r.dribbleCut],['その他',0]],d.games)}${breakdown('REB',d.reb,[['オフェンス',r.or],['ディフェンス',r.dr]],d.games)}${breakdown('TO',d.to,[['パスミス',r.passMiss],['ドリブルミス',r.dribbleMiss],['キャッチミス',r.catchMiss],['バイオレーション',r.violation],['その他',r.otherTo]],d.games)}</div>`}
function home(){const p=player();const items=p?playerStats(p.id):[];const r=sumStats(items),d=derived(r);return `<div class="no-top-tap mobile-only"></div><div class="card"><div class="player-title"><div><div class="sub">最後に選択した選手</div><div class="player-name">${p?`No.${p.number||''} ${p.name||''}`:'選手未登録'}</div><div class="sub">${p?.position||''} ${p?.grade||''}</div></div><span class="pill">換算 ${d.games.toFixed(1)}試合</span></div><div class="auth-actions mobile-only">${state.user?`<button class="btn login-home" id="addGameHome">＋試合を登録</button><button class="btn ghost login-home" id="logoutHome">ログアウト</button>`:`<button class="btn login-home" id="loginHome">ログイン</button>`}</div></div><div class="card"><div class="section-title">1試合平均（全試合） <span class="pill">換算 ${d.games.toFixed(1)}試合</span></div>${statsGrid(r,true)}</div>${allBreakdowns(r,d)}<div class="card pc-only"><button class="btn" id="addGameHomePc">＋試合を登録</button></div>`}
function playersView(){return `<div class="card"><div class="row" style="justify-content:space-between"><h2>選手</h2>${state.user?'<button class="btn" id="addPlayer">＋選手登録</button>':''}</div>${state.players.map(p=>`<div class="list-item"><div class="game-line2">No.${p.number||''} ${p.name||''}</div><div class="sub">${p.grade||''} ${p.position||''}</div>${state.user?`<div class="row"><button class="btn small ghost" onclick="editPlayer('${p.id}')">修正</button><button class="btn small danger" onclick="deletePlayer('${p.id}')">削除</button></div>`:''}</div>`).join('')||'<p class="sub">選手データなし</p>'}</div>`}
function gamesView(){const games=orderedGames();return `<div class="card"><div class="row" style="justify-content:space-between"><h2>試合一覧</h2>${state.user?'<button class="btn" id="addGame">＋試合登録</button>':''}</div><p class="sub">試合はドラッグまたは長押しして並べ替えできます。</p>${games.map(g=>`<div class="list-item game-draggable" draggable="true" data-gameid="${g.id}" onclick="openGameDetail('${g.id}')"><div class="game-line1"><span>${g.date||''}</span><span>${g.tournament||''}${categoryLabel(g)}</span></div><div class="game-line2"><span>vs ${g.opponent||''}</span><span>${g.quarters||0}Q　${resultMark(g)} ${g.ownScore||0}-${g.oppScore||0}</span></div></div>`).join('')||'<p class="sub">試合データなし</p>'}</div>`}
function statsView(){const p=player();let targets=[]; if(state.statsMode==='game')targets=orderedGames().map(g=>({id:g.id,label:`vs ${g.opponent||''}｜${g.date||''}｜${g.tournament||''}`})); if(state.statsMode==='tournament')targets=[...new Set(state.games.map(g=>g.tournament).filter(Boolean))].map(x=>({id:x,label:x})); if(state.statsMode==='category')targets=[...new Set(state.games.map(g=>g.category).filter(Boolean))].map(x=>({id:x,label:x})); if(state.statsMode==='day')targets=[...new Set(state.games.map(g=>g.date).filter(Boolean))].map(x=>({id:x,label:x})); if(state.statsMode==='month')targets=[...new Set(state.games.map(g=>(g.date||'').slice(0,7)).filter(Boolean))].map(x=>({id:x,label:x})); if(state.statsMode==='year')targets=[...new Set(state.games.map(g=>(g.date||'').slice(0,4)).filter(Boolean))].map(x=>({id:x,label:x})); if(!state.targetId&&targets[0]) state.targetId=targets[0].id; const items=filterItems(p?.id); const r=sumStats(items);const d=derived(r); const head=statsHead(p,items); return `<div class="card"><h2>分析</h2><div class="form-grid"><label>選手<select id="statPlayer">${state.players.map(x=>`<option value="${x.id}" ${x.id===p?.id?'selected':''}>No.${x.number||''} ${x.name||''}</option>`).join('')}</select></label><label>集計<select id="statMode"><option value="game">試合</option><option value="tournament">大会</option><option value="category">カテゴリー</option><option value="day">日</option><option value="month">月</option><option value="year">年</option></select></label><label class="wide">対象<select id="statTarget">${targets.map(t=>`<option value="${t.id}" ${t.id===state.targetId?'selected':''}>${t.label}</option>`).join('')}</select></label></div></div><div class="card detail-head">${head}</div><div class="card"><div class="section-title">1試合平均 <span class="pill">換算 ${d.games.toFixed(1)}試合</span></div>${statsGrid(r,true)}</div>${allBreakdowns(r,d)}`}
function filterItems(pid){let games=state.games;if(state.statsMode==='game') games=games.filter(g=>g.id===state.targetId); if(state.statsMode==='tournament') games=games.filter(g=>g.tournament===state.targetId); if(state.statsMode==='category') games=games.filter(g=>g.category===state.targetId); if(state.statsMode==='day') games=games.filter(g=>g.date===state.targetId); if(state.statsMode==='month') games=games.filter(g=>(g.date||'').slice(0,7)===state.targetId); if(state.statsMode==='year') games=games.filter(g=>(g.date||'').slice(0,4)===state.targetId); const ids=new Set(games.map(g=>g.id)); return state.stats.filter(s=>s.playerId===pid&&ids.has(s.gameId))}
function statsHead(p,items){if(state.statsMode==='game'){const g=state.games.find(x=>x.id===state.targetId);const s=items[0]||{}; if(!g)return '対象データなし'; const pts=num(s.twoPm)*2+num(s.threePm)*3+num(s.ftm);return `<div class="game-line1"><span>${g.date||''}</span><span>${g.tournament||''}${categoryLabel(g)}</span></div><div class="game-line2"><span>vs ${g.opponent||''}</span><span>${g.quarters||0}Q　${resultMark(g)} ${g.ownScore||0}-${g.oppScore||0}</span></div><div class="sub">${p?`No.${p.number||''} ${p.name||''}`:''}　PTS ${pts}</div>`} if(state.statsMode==='tournament'){const games=state.games.filter(g=>g.tournament===state.targetId);return `<div class="game-line2"><span>${state.targetId||'対象データなし'}</span></div><div class="sub">${p?`No.${p.number||''} ${p.name||''}`:''}</div><div class="section-title">対象試合結果</div>${gameResultsList(games)}`} if(state.statsMode==='category'){const games=state.games.filter(g=>g.category===state.targetId);return `<div class="game-line2"><span>${state.targetId||'対象データなし'}</span></div><div class="sub">${p?`No.${p.number||''} ${p.name||''}`:''}</div><div class="section-title">対象試合結果</div>${gameResultsList(games)}`} return `<div class="game-line2"><span>${state.targetId||'対象データなし'}</span></div><div class="sub">${p?`No.${p.number||''} ${p.name||''}`:''}</div>`}
function gameDetailView(){const g=state.games.find(x=>x.id===state.selectedGameId); if(!g)return `<div class="card"><button class="btn ghost" onclick="goBackGames()">戻る</button><p class="sub">試合が見つかりません</p></div>`; let p=player(); const s=gameStats(g.id,p?.id)||{}; const r=sumStats(s.id?[s]:[]); const d=derived(r); return `<div class="card"><div class="row" style="justify-content:space-between"><button class="btn ghost" onclick="goBackGames()">←</button>${state.user?`<button class="btn small" onclick="openGameForm('${g.id}')">修正</button>`:''}</div><div class="game-detail-head"><div>${g.date||''}　${g.tournament||''}${categoryLabel(g)}</div><h2>vs ${g.opponent||''}</h2><div><span>${g.quarters||0}Q</span>　${resultMark(g)}　<b>${g.ownScore||0} - ${g.oppScore||0}</b></div></div></div><div class="card"><label>個人スタッツ<select id="detailPlayer">${state.players.map(x=>`<option value="${x.id}" ${x.id===p?.id?'selected':''}>No.${x.number||''} ${x.name||''}</option>`).join('')}</select></label>${statsGrid(r,false)}${allBreakdowns(r,d)}<div class="row">${state.user?`<button class="btn" onclick="openStatsForm('${g.id}')">個人スタッツ修正</button><button class="btn danger" onclick="deletePlayerStats('${g.id}', '${p?.id||''}')">個人スタッツ削除</button>`:''}</div></div>`}
window.openGameDetail=(id)=>{state.selectedGameId=id;state.tab='gameDetail';render()};
window.deletePlayerStats=async(gameId,playerId)=>{if(!requireLogin())return;if(!playerId)return;if(confirm('この選手の個人スタッツを削除しますか？')){await deleteDoc(doc(db,'stats',`${gameId}_${playerId}`));toast('削除しました');render()}};

function settingsView(){return `<div class="card"><h2>設定</h2><p class="sub">ログイン状態はログアウトするまで保持されます。端末のパスワード保存・自動入力に対応しています。</p><button class="btn ghost" onclick="location.reload()">再読み込み</button></div>`}
function render(){navRender();const map={home,players:playersView,games:gamesView,gameDetail:gameDetailView,stats:statsView,settings:settingsView};$('#view').innerHTML=map[state.tab]();bind()}
function bind(){const lh=$('#loginHome'); if(lh)lh.onclick=loginModal; const lo=$('#logoutHome'); if(lo)lo.onclick=logout; const ag=$('#addGame'),agh=$('#addGameHome'),aghp=$('#addGameHomePc'); [ag,agh,aghp].filter(Boolean).forEach(b=>b.onclick=()=>gameForm()); const ap=$('#addPlayer'); if(ap)ap.onclick=()=>playerForm(); const sp=$('#statPlayer'); if(sp)sp.onchange=e=>{state.lastPlayerId=e.target.value;localStorage.setItem('r32_last_player',state.lastPlayerId);render()}; const sm=$('#statMode'); if(sm){sm.value=state.statsMode; sm.onchange=e=>{state.statsMode=e.target.value;state.targetId='';render()}} const st=$('#statTarget'); if(st)st.onchange=e=>{state.targetId=e.target.value;render()}; const dp=$('#detailPlayer'); if(dp)dp.onchange=e=>{state.lastPlayerId=e.target.value;localStorage.setItem('r32_last_player',state.lastPlayerId);render()}; bindGameSort()}
window.editPlayer=(id)=>playerForm(state.players.find(p=>p.id===id)); window.deletePlayer=async(id)=>{if(!requireLogin())return;if(confirm('選手と関連スタッツを削除しますか？')){await deleteDoc(doc(db,'players',id)); for(const s of state.stats.filter(x=>x.playerId===id)) await deleteDoc(doc(db,'stats',s.id));toast('削除しました')}};
function playerForm(p={}){if(!requireLogin())return;modal(`<h2>${p.id?'選手修正':'選手登録'}</h2><div class="form-grid"><label>名前<input id="pName" value="${p.name||''}"></label><label>背番号<input id="pNum" value="${p.number||''}"></label><label>学年<input id="pGrade" value="${p.grade||''}"></label><label>ポジション<input id="pPos" value="${p.position||''}"></label></div><div class="row"><button class="btn" id="savePlayer">保存</button><button class="btn ghost" id="closeModal">閉じる</button></div>`);$('#savePlayer').onclick=async()=>{const id=p.id||uid();await setDoc(doc(db,'players',id),{name:$('#pName').value,number:$('#pNum').value,grade:$('#pGrade').value,position:$('#pPos').value,updatedAt:serverTimestamp()},{merge:true});closeModal();toast('保存しました')};$('#closeModal').onclick=closeModal}
function gameForm(g={}){if(!requireLogin())return;modal(`<h2>${g.id?'試合修正':'試合登録'}</h2><div class="form-grid"><label>年月日<input type="date" id="gDate" value="${g.date||''}"></label><label>Q数<input type="number" id="gQ" value="${g.quarters||4}"></label><label>カテゴリー<input id="gCat" value="${g.category||''}" placeholder="公式戦・練習試合など"></label><label>大会名<input id="gTour" value="${g.tournament||''}"></label><label>対戦相手<input id="gOpp" value="${g.opponent||''}"></label><label>自チーム得点<input type="number" id="gOwn" value="${g.ownScore||0}"></label><label>相手得点<input type="number" id="gOppScore" value="${g.oppScore||0}"></label></div><div class="row"><button class="btn" id="saveGame">保存</button><button class="btn ghost" id="closeModal">閉じる</button>${g.id?'<button class="btn danger" id="deleteGameFromForm">削除</button>':''}</div>`);$('#saveGame').onclick=async()=>{const id=g.id||uid();await setDoc(doc(db,'games',id),{date:$('#gDate').value,quarters:num($('#gQ').value),category:$('#gCat').value,tournament:$('#gTour').value,opponent:$('#gOpp').value,ownScore:num($('#gOwn').value),oppScore:num($('#gOppScore').value),order:num(g.order)||0,updatedAt:serverTimestamp()},{merge:true});closeModal();toast('保存しました')};$('#closeModal').onclick=closeModal; const dg=$('#deleteGameFromForm'); if(dg)dg.onclick=async()=>{if(confirm('この試合と関連スタッツを削除しますか？')){await deleteDoc(doc(db,'games',g.id));for(const s of state.stats.filter(x=>x.gameId===g.id)) await deleteDoc(doc(db,'stats',s.id));closeModal();state.tab='games';toast('削除しました')}}}


window.goBackGames=()=>{state.tab='games';state.selectedGameId='';render()};
window.openGameForm=(id)=>{const g=state.games.find(x=>x.id===id); if(g) gameForm(g)};
window.openStatsForm=(gameId)=>statsForm(gameId);
window.gameActions=(id)=>{const g=state.games.find(x=>x.id===id);modal(`<h2>vs ${g.opponent||''}</h2><p class="sub">${g.date||''} ${g.tournament||''} ${resultMark(g)} ${g.ownScore||0}-${g.oppScore||0}</p><div class="grid"><button class="btn" id="statsReg">スタッツ登録</button><button class="btn ghost" id="editGame">試合修正</button><button class="btn danger" id="delGame">試合削除</button><button class="btn ghost" id="closeModal">閉じる</button></div>`);$('#statsReg').onclick=()=>statsForm(id);$('#editGame').onclick=()=>{closeModal();gameForm(g)};$('#delGame').onclick=async()=>{if(!requireLogin())return;if(confirm('この試合と関連スタッツを削除しますか？')){await deleteDoc(doc(db,'games',id));for(const s of state.stats.filter(x=>x.gameId===id)) await deleteDoc(doc(db,'stats',s.id));closeModal();toast('削除しました')}};$('#closeModal').onclick=closeModal}
let dragGameId='';
window.gameDragStart=(ev)=>{dragGameId=ev.currentTarget.dataset.gameid;ev.currentTarget.classList.add('dragging');try{ev.dataTransfer.setData('text/plain',dragGameId)}catch(e){}};
window.gameDragEnd=(ev)=>{ev.currentTarget.classList.remove('dragging')};
window.gameDragOver=(ev)=>{ev.preventDefault()};
window.gameDrop=async(ev)=>{ev.preventDefault();ev.stopPropagation();const targetId=ev.currentTarget.dataset.gameid;const fromId=dragGameId;dragGameId='';if(!fromId||!targetId||fromId===targetId)return;if(!state.user){toast('並べ替えにはログインが必要です');return}const games=orderedGames();const from=games.findIndex(g=>g.id===fromId),to=games.findIndex(g=>g.id===targetId);if(from<0||to<0)return;const [moved]=games.splice(from,1);games.splice(to,0,moved);state.games=games;render();for(let i=0;i<games.length;i++){await setDoc(doc(db,'games',games[i].id),{order:i+1,updatedAt:serverTimestamp()},{merge:true})}toast('並べ替えを保存しました')};
function bindGameSort(){document.querySelectorAll('.game-draggable').forEach(el=>{el.addEventListener('dragstart',window.gameDragStart);el.addEventListener('dragend',window.gameDragEnd);el.addEventListener('dragover',window.gameDragOver);el.addEventListener('drop',window.gameDrop)})}
function statsForm(gameId){if(!requireLogin())return;const g=state.games.find(x=>x.id===gameId);const existingForGame=state.stats.filter(x=>x.gameId===gameId);let defaultPid=state.lastPlayerId||'';if(defaultPid&&!state.players.some(p=>p.id===defaultPid)) defaultPid='';if(!defaultPid&&existingForGame[0]) defaultPid=existingForGame[0].playerId;if(!defaultPid&&state.players[0]) defaultPid=state.players[0].id;
modal(`<h2>スタッツ登録</h2><p class="sub">${g?`vs ${g.opponent||''}｜${g.date||''}｜${g.tournament||''}`:''}</p><label>選手<select id="sfPlayer">${state.players.map(p=>`<option value="${p.id}" ${p.id===defaultPid?'selected':''}>No.${p.number||''} ${p.name||''}</option>`).join('')}</select></label><div id="sfBody"></div><button class="btn" id="saveStats">保存</button><button class="btn ghost" id="closeModal">閉じる</button>`);
const load=()=>{const pid=$('#sfPlayer').value;state.lastPlayerId=pid;localStorage.setItem('r32_last_player',pid);const s=(state.stats.find(x=>x.gameId===gameId&&x.playerId===pid)||{});$('#sfBody').innerHTML=`<div class="form-grid"><label>2PA<input type="number" id="twoPa" value="${num(s.twoPa)}"></label><label>2PM<input type="number" id="twoPm" value="${num(s.twoPm)}"></label><label>3PA<input type="number" id="threePa" value="${num(s.threePa)}"></label><label>3PM<input type="number" id="threePm" value="${num(s.threePm)}"></label><label>FTA<input type="number" id="fta" value="${num(s.fta)}"></label><label>FTM<input type="number" id="ftm" value="${num(s.ftm)}"></label><label>AST<input type="number" id="ast" value="${num(s.ast)}"></label><label>BLK<input type="number" id="blk" value="${num(s.blk)}"></label><label>パスカット<input type="number" id="passCut" value="${num(s.passCut)}"></label><label>ドリブルカット<input type="number" id="dribbleCut" value="${num(s.dribbleCut)}"></label><label>OR<input type="number" id="or" value="${num(s.or)}"></label><label>DR<input type="number" id="dr" value="${num(s.dr)}"></label><label>パスミス<input type="number" id="passMiss" value="${num(s.passMiss)}"></label><label>ドリブルミス<input type="number" id="dribbleMiss" value="${num(s.dribbleMiss)}"></label><label>キャッチミス<input type="number" id="catchMiss" value="${num(s.catchMiss)}"></label><label>バイオレーション<input type="number" id="violation" value="${num(s.violation)}"></label><label>その他TO<input type="number" id="otherTo" value="${num(s.otherTo)}"></label></div><p class="sub">既に登録済みのスタッツがある場合は、その内容を表示しています。</p>`};$('#sfPlayer').onchange=load; load();$('#saveStats').onclick=async()=>{const pid=$('#sfPlayer').value;const id=`${gameId}_${pid}`;const keys=['twoPa','twoPm','threePa','threePm','fta','ftm','ast','blk','passCut','dribbleCut','or','dr','passMiss','dribbleMiss','catchMiss','violation','otherTo'];const data={gameId,playerId:pid,quarters:g?.quarters||4,updatedAt:serverTimestamp()};keys.forEach(k=>data[k]=num($('#'+k).value));await setDoc(doc(db,'stats',id),data,{merge:true});state.lastPlayerId=pid;localStorage.setItem('r32_last_player',pid);closeModal();toast('保存しました')};$('#closeModal').onclick=closeModal}
render();
</script>
</body></html>
