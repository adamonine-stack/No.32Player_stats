<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>R32 Basketball Stats</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#090f22" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-art"></div>
  <div id="app" class="app-shell">
    <header class="hero">
      <div class="hero-bg"></div>
      <div class="hero-copy">
        <p class="eyebrow">R32 BASKETBALL STATS</p>
        <p id="cloudStatus" class="sync-chip">クラウド接続確認中...</p>
      </div>
    </header>

    <main class="layout">
      <section class="desktop-side card glass">
        <h2>R32</h2>
        <p>選手・試合・スタッツを管理</p>
        <button class="nav-btn active" data-tab="home">ホーム</button>
        <button class="nav-btn" data-tab="players">選手</button>
        <button class="nav-btn" data-tab="games">試合</button>
        <button class="nav-btn" data-tab="stats">スタッツ</button>
        <button class="nav-btn" data-tab="settings">設定</button>
      </section>

      <section class="content">
        <section id="tab-home" class="tab-page active"></section>
        <section id="tab-players" class="tab-page"></section>
        <section id="tab-games" class="tab-page"></section>
        <section id="tab-stats" class="tab-page"></section>
        <section id="tab-settings" class="tab-page"></section>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="home">🏠<span>ホーム</span></button>
      <button class="nav-btn" data-tab="players">👤<span>選手</span></button>
      <button class="nav-btn" data-tab="games">🏀<span>試合</span></button>
      <button class="nav-btn" data-tab="stats">📊<span>スタッツ</span></button>
      <button class="nav-btn" data-tab="settings">⚙️<span>設定</span></button>
    </nav>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
