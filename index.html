<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>R32 Basketball Stats</title>
  <meta name="theme-color" content="#050914" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <aside class="sidebar desktop-only">
      <div class="brand"><img src="icons/icon-192.png" alt="R32"><div><b>R32</b><span>BASKETBALL STATS</span></div></div>
      <nav id="sideNav"></nav>
      <div class="sidebar-wallpaper"></div>
      <div class="auth-box"><button id="loginBtnSide" class="primary small">ログイン</button><button id="logoutBtnSide" class="ghost small hidden">ログアウト</button><span id="authLabelSide">ログインせずに閲覧</span></div>
    </aside>
    <main class="main">
      <header class="topbar mobile-only">
        <button id="menuBtn" class="iconbtn">☰</button>
        <img class="top-logo" src="icons/icon-192.png" alt="R32" />
        <button class="iconbtn">♢</button>
      </header>
      <section id="view"></section>
    </main>
    <nav id="bottomNav" class="bottom-nav"></nav>
  </div>
  <dialog id="authDialog" class="dialog">
    <form method="dialog" class="dialog-card" id="authForm">
      <h2>管理者ログイン</h2>
      <input id="email" type="email" placeholder="メールアドレス" autocomplete="email" />
      <input id="password" type="password" placeholder="パスワード" autocomplete="current-password" />
      <div class="dialog-actions"><button value="cancel" class="ghost">閉じる</button><button id="doLogin" value="default" class="primary">ログイン</button></div>
      <p id="authError" class="error"></p>
    </form>
  </dialog>
  <script type="module" src="js/app.js"></script>
</body>
</html>
