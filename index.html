<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>No.32 Player Stats</title>
  <meta name="theme-color" content="#ff7a1a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Basketball Analytics</p>
        <h1>No.32 Player Stats</h1>
        <p class="hero-copy">試合入力、Q別換算、TO分類、奪取分類、動画管理まで一括管理。</p>
      </div>
      <div class="ball-badge">🏀</div>
    </header>

    <nav class="tabs" aria-label="メニュー">
      <button class="tab active" data-view="dashboard">ホーム</button>
      <button class="tab" data-view="players">選手</button>
      <button class="tab" data-view="games">試合</button>
      <button class="tab" data-view="analysis">分析</button>
      <button class="tab" data-view="videos">動画</button>
      <button class="tab" data-view="settings">設定</button>
    </nav>

    <main>
      <section id="dashboard" class="view active"></section>
      <section id="players" class="view"></section>
      <section id="games" class="view"></section>
      <section id="analysis" class="view"></section>
      <section id="videos" class="view"></section>
      <section id="settings" class="view"></section>
    </main>
  </div>

  <template id="emptyState">
    <div class="empty">
      <div class="empty-icon">📋</div>
      <p>まだデータがありません。</p>
    </div>
  </template>

  <script type="module" src="js/app.js"></script>
</body>
</html>
