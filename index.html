  <style>
    :root{--bg:#060814;--panel:#111735e6;--panel2:#171f43e6;--line:#2b3568;--text:#f7f8ff;--muted:#aeb6d9;--orange:#ff8a1f;--purple:#8d5cff;--danger:#ff5b7a;--ok:#31d3a6;--shadow:0 18px 50px rgba(0,0,0,.38);--radius:22px}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at 18% 6%,rgba(141,92,255,.25),transparent 28%),radial-gradient(circle at 78% 18%,rgba(255,138,31,.18),transparent 26%),var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;padding-bottom:86px} button,input,select{font:inherit} button{cursor:pointer;border:0} .app{max-width:1180px;margin:auto;padding:14px}.topHero{position:relative;overflow:hidden;border-radius:28px;min-height:154px;background:linear-gradient(135deg,#0b1025,#101942 60%,#060814);box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.08);margin-bottom:14px}.heroArt{position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,8,20,.88),rgba(6,8,20,.34),rgba(6,8,20,.78)),url('assets/r32-background.png') center/cover no-repeat;opacity:.95}.shoe{position:absolute;left:18px;bottom:20px;width:166px;height:54px;background:linear-gradient(135deg,#0a0a11,#1d1835);border:2px solid #2c2757;border-radius:70% 40% 35% 55%;transform:rotate(-12deg);box-shadow:0 18px 30px rgba(0,0,0,.45)}.shoe:after{content:"";position:absolute;right:18px;top:10px;width:42px;height:22px;border-radius:50%;border-top:5px solid #8d5cff}.heroTitle{position:absolute;left:20px;top:18px}.heroTitle h1{font-size:24px;margin:0 0 4px}.heroTitle p{margin:0;color:var(--muted);font-size:12px}.loginArea{position:absolute;right:16px;bottom:16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.btn{background:linear-gradient(135deg,var(--purple),#5b8cff);color:white;border-radius:999px;padding:10px 14px;font-weight:800;box-shadow:0 10px 24px rgba(92,92,255,.28)}.btn.orange{background:linear-gradient(135deg,#ff9c2f,#ff5f2e)}.btn.ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);box-shadow:none}.btn.danger{background:linear-gradient(135deg,#ff5b7a,#cc3150)}.tabs{position:fixed;left:0;right:0;bottom:0;background:rgba(7,10,24,.92);backdrop-filter:blur(16px);border-top:1px solid rgba(255,255,255,.12);display:flex;justify-content:center;z-index:50;padding:8px max(8px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom))}.tabbar{width:min(620px,100%);display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.tab{padding:10px 4px;border-radius:16px;background:transparent;color:var(--muted);font-weight:800;font-size:12px}.tab.active{background:linear-gradient(135deg,rgba(141,92,255,.42),rgba(255,138,31,.25));color:white}.card{background:linear-gradient(180deg,rgba(23,31,67,.86),rgba(10,14,34,.9));border:1px solid rgba(255,255,255,.09);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}.sectionTitle{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:12px}.sectionTitle h2{margin:0;font-size:20px}.sub{color:var(--muted);font-size:12px}.grid{display:grid;gap:10px}.grid3{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:repeat(2,1fr)}.statCell{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:12px;min-height:76px}.statLabel{font-size:12px;color:var(--muted);font-weight:800}.statValue{font-size:20px;font-weight:900;margin-top:5px}.percent{color:#fff}.breakdowns{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.breakCard{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.07);border-radius:18px;padding:12px}.breakHead{font-size:16px;font-weight:900;margin-bottom:8px}.breakTotal{font-size:24px;font-weight:900;color:#fff}.breakLine{display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.08);padding-top:6px;margin-top:6px;color:var(--muted);font-size:12px}.formGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.formGrid.full{grid-template-columns:1fr}.field label{display:block;color:var(--muted);font-size:12px;font-weight:800;margin:0 0 5px}.field input,.field select{width:100%;background:#0a1028;color:white;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:left;min-width:0}.wide{grid-column:1/-1}.listItem{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:12px;margin-bottom:10px}.gameRow1,.gameRow2{display:flex;justify-content:space-between;gap:8px;align-items:center}.gameRow1{font-size:12px;color:var(--muted)}.gameRow2{margin-top:6px;font-weight:900}.actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}.hidden{display:none!important}.pill{border-radius:999px;background:rgba(255,138,31,.16);color:#ffbf7d;padding:5px 9px;font-size:12px;font-weight:900}.status{color:var(--muted);font-size:12px;margin-top:6px}.desktopOnly{display:none}.mobileOnly{display:block}.pcShell{display:none}.selectRow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.notice{padding:12px;border-radius:16px;background:rgba(255,138,31,.12);border:1px solid rgba(255,138,31,.22);color:#ffd4a8;font-size:13px}.wallpaper{position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.12;background:linear-gradient(180deg,rgba(6,8,20,.76),rgba(6,8,20,.94)),url('assets/r32-background.png') center/cover no-repeat}
    
    .loginModal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.58);backdrop-filter:blur(10px);z-index:100;padding:18px}.loginModal.show{display:flex}.loginBox{width:min(420px,100%);background:linear-gradient(180deg,rgba(23,31,67,.96),rgba(10,14,34,.98));border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:18px;box-shadow:var(--shadow)}.loginBox h2{margin:0 0 12px}.loginBox .field{margin-bottom:10px}.loginBox .actions{justify-content:flex-end}.loginError{color:#ffb0c0;font-size:12px;min-height:18px}.saveNote{color:var(--muted);font-size:12px;line-height:1.5;margin-top:8px}
    @media (min-width: 760px){body{padding-bottom:0}.mobileOnly,.tabs{display:none}.desktopOnly,.pcShell{display:block}.app{display:grid;grid-template-columns:230px 1fr;gap:16px;padding:20px}.side{position:sticky;top:20px;height:calc(100vh - 40px);border-radius:28px;background:linear-gradient(180deg,rgba(16,22,52,.95),rgba(7,10,24,.95));border:1px solid rgba(255,255,255,.1);padding:16px;overflow:hidden}.side:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(6,8,20,.35),rgba(6,8,20,.88)),url('assets/r32-background.png') center/cover no-repeat;opacity:.72}.side h1{position:relative;margin:0 0 18px}.side .nav{position:relative;display:grid;gap:8px}.side .tab{font-size:14px;text-align:left;padding:12px}.main{min-width:0}.topHero{min-height:126px}.grid3{grid-template-columns:repeat(3,1fr)}.grid2{grid-template-columns:repeat(4,1fr)}.formGrid{grid-template-columns:repeat(4,1fr)}.breakdowns{grid-template-columns:repeat(3,1fr)}.pcCompact{display:grid;grid-template-columns:1.2fr .8fr;gap:14px}.statValue{font-size:24px}}
  </style>
</head>
<body>
<div class="wallpaper"></div>
<div class="app">
  <aside class="side desktopOnly"><h1>R32</h1><div class="nav" id="pcNav"></div></aside>
  <main class="main">
    <section class="topHero mobileOnly">
      <div class="heroArt"></div><div class="shoe"></div>
      <div class="heroTitle"><h1>R32 Basketball Stats</h1><p id="cloudStatus">クラウド接続確認中</p></div>
      <div class="loginArea" id="heroActions"></div>
    </section>
    <section class="topHero desktopOnly">
      <div class="heroArt"></div><div class="shoe"></div>
      <div class="heroTitle"><h1>R32 Basketball Stats</h1><p id="cloudStatusPc">クラウド接続確認中</p></div>
      <div class="loginArea" id="heroActionsPc"></div>
    </section>
    <div id="view"></div>
  </main>
</div>
<nav class="tabs"><div class="tabbar" id="mobileNav"></div></nav>


<div class="loginModal" id="loginModal">
  <div class="loginBox">
    <h2>ログイン</h2>
    <div class="field"><label>メールアドレス</label><input id="loginEmail" type="email" autocomplete="username email" inputmode="email"></div>
    <div class="field"><label>パスワード</label><input id="loginPassword" type="password" autocomplete="current-password"></div>
    <div class="loginError" id="loginError"></div>
    <div class="actions"><button class="btn ghost" id="cancelLogin">キャンセル</button><button class="btn orange" id="submitLogin">ログイン</button></div>
    <div class="saveNote">ログイン状態はログアウトするまで保持されます。パスワード保存はiCloudキーチェーンやGoogleパスワードマネージャーが利用できます。</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js';
import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js';

const firebaseConfig={apiKey:'AIzaSyDiaAHF0iceYJNlSDKFKtHKnCETeMCW8IA',authDomain:'no32-player-stats.firebaseapp.com',projectId:'no32-player-stats',storageBucket:'no32-player-stats.firebasestorage.app',messagingSenderId:'934416639889',appId:'1:934416639889:web:cd0e319fa86c1acb3fdc30'};
let app,auth,db; try{app=initializeApp(firebaseConfig);auth=getAuth(app);db=getFirestore(app); await setPersistence(auth,browserLocalPersistence);}catch(e){console.error(e)}
const $=s=>document.querySelector(s); const fmt=n=>(Number(n)||0).toFixed(1).replace(/\.0$/,''); const pct=(m,a)=>a?Math.round(m/a*1000)/10:0;
let state={tab:'home',user:null,players:[],games:[],stats:[],selectedPlayerId:localStorage.getItem('r32_selected_player')||'',selectedGameId:'',mode:'game',target:''};
const tabs=[['home','ホーム'],['players','選手'],['games','試合'],['stats','スタッツ'],['settings','設定']];
function nav(){const html=tabs.map(t=>`<button class="tab ${state.tab===t[0]?'active':''}" data-tab="${t[0]}">${t[1]}</button>`).join('');$('#mobileNav').innerHTML=html;$('#pcNav').innerHTML=html;document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()})}
function status(txt){$('#cloudStatus').textContent=txt;$('#cloudStatusPc').textContent=txt}
async function load(){if(!db)return; try{state.players=(await getDocs(collection(db,'players'))).docs.map(d=>({id:d.id,...d.data()})); state.games=(await getDocs(query(collection(db,'games'),orderBy('date','desc')))).docs.map(d=>({id:d.id,...d.data()})); state.stats=(await getDocs(collection(db,'stats'))).docs.map(d=>({id:d.id,...d.data()})); if(!state.selectedPlayerId&&state.players[0]) state.selectedPlayerId=state.players[0].id; status('クラウド接続済み');}catch(e){console.error(e);status('クラウド接続エラー')}}
if(auth) onAuthStateChanged(auth,async u=>{state.user=u; await load(); render()});
function authButtons(){const logged=!!state.user; const html=logged?`<button class="btn orange" id="addGameBtn">＋試合を登録</button><button class="btn ghost" id="logoutBtn">ログアウト</button>`:`<button class="btn orange" id="loginBtn">ログイン</button>`; $('#heroActions').innerHTML=html; $('#heroActionsPc').innerHTML=html; document.querySelectorAll('#loginBtn').forEach(b=>b.onclick=openLogin); document.querySelectorAll('#logoutBtn').forEach(b=>b.onclick=()=>signOut(auth)); document.querySelectorAll('#addGameBtn').forEach(b=>b.onclick=()=>{state.tab='games'; renderGameForm()})}
function openLogin(){ $('#loginModal').classList.add('show'); $('#loginError').textContent=''; setTimeout(()=>$('#loginEmail')?.focus(),50) }
function closeLogin(){ $('#loginModal').classList.remove('show') }
async function submitLogin(){const email=$('#loginEmail').value.trim(); const pass=$('#loginPassword').value; if(!email||!pass){$('#loginError').textContent='メールアドレスとパスワードを入力してください'; return} try{await signInWithEmailAndPassword(auth,email,pass); closeLogin(); $('#loginPassword').value=''}catch(e){$('#loginError').textContent='ログイン失敗：'+e.message}}
function player(){return state.players.find(p=>p.id===state.selectedPlayerId)||state.players[0]||null}
function filteredStats(){return state.stats.filter(s=>!state.selectedPlayerId||s.playerId===state.selectedPlayerId).filter(s=>{const g=state.games.find(x=>x.id===s.gameId); if(!g)return false; if(state.mode==='game') return !state.target||g.id===state.target; if(state.mode==='tournament')return !state.target||g.tournament===state.target; if(state.mode==='day')return !state.target||g.date===state.target; if(state.mode==='month')return !state.target||String(g.date||'').slice(0,7)===state.target; if(state.mode==='year')return !state.target||String(g.date||'').slice(0,4)===state.target; return true})}
function sumStats(list){const keys=['twoPa','twoPm','threePa','threePm','fta','ftm','ast','blk','passCut','dribbleSteal','or','dr','passMiss','dribbleMiss','catchMiss','violation','otherTo']; const o=Object.fromEntries(keys.map(k=>[k,0])); let q=0; list.forEach(s=>{keys.forEach(k=>o[k]+=Number(s[k]||0)); const g=state.games.find(x=>x.id===s.gameId); q+=Number(g?.quarters||0)}); o.q=q;o.factor=q?4/q:0; return o}
function avg(v,o){return o.factor?fmt(v*o.factor):'0'}
function statGrid(o, average=true){const f=average?o.factor:1; const twoPa=o.twoPa*f,twoPm=o.twoPm*f,threePa=o.threePa*f,threePm=o.threePm*f,fta=o.fta*f,ftm=o.ftm*f; const fga=twoPa+threePa,fgm=twoPm+threePm; return `<div class="grid grid3"><div class="statCell"><div class="statLabel">2PA / 2PM / 2P%</div><div class="statValue">${fmt(twoPa)} / ${fmt(twoPm)} / ${pct(twoPm,twoPa)}%</div></div><div class="statCell"><div class="statLabel">3PA / 3PM / 3P%</div><div class="statValue">${fmt(threePa)} / ${fmt(threePm)} / ${pct(threePm,threePa)}%</div></div><div class="statCell"><div class="statLabel">FGA / FGM / FG%</div><div class="statValue">${fmt(fga)} / ${fmt(fgm)} / ${pct(fgm,fga)}%</div></div><div class="statCell"><div class="statLabel">FTA / FTM / FT%</div><div class="statValue">${fmt(fta)} / ${fmt(ftm)} / ${pct(ftm,fta)}%</div></div><div class="statCell"><div class="statLabel">AST</div><div class="statValue">${avg(o.ast,o)}</div></div><div class="statCell"><div class="statLabel">BLK</div><div class="statValue">${avg(o.blk,o)}</div></div></div>`}
function breakdowns(o,average=true){const f=average?o.factor:1; const stl=(o.passCut+o.dribbleSteal)*f, reb=(o.or+o.dr)*f, to=(o.passMiss+o.dribbleMiss+o.catchMiss+o.violation+o.otherTo)*f; return `<div class="breakdowns"><div class="breakCard"><div class="breakHead">STL <span class="breakTotal">${fmt(stl)}</span></div><div class="breakLine"><b>合計</b><b>${fmt(stl)}</b></div><div class="breakLine"><span>パスカット</span><b>${fmt(o.passCut*f)}</b></div><div class="breakLine"><span>ドリブルカット</span><b>${fmt(o.dribbleSteal*f)}</b></div></div><div class="breakCard"><div class="breakHead">REB <span class="breakTotal">${fmt(reb)}</span></div><div class="breakLine"><b>合計</b><b>${fmt(reb)}</b></div><div class="breakLine"><span>オフェンス</span><b>${fmt(o.or*f)}</b></div><div class="breakLine"><span>ディフェンス</span><b>${fmt(o.dr*f)}</b></div></div><div class="breakCard"><div class="breakHead">TO <span class="breakTotal">${fmt(to)}</span></div><div class="breakLine"><b>合計</b><b>${fmt(to)}</b></div><div class="breakLine"><span>パスミス</span><b>${fmt(o.passMiss*f)}</b></div><div class="breakLine"><span>ドリブルミス</span><b>${fmt(o.dribbleMiss*f)}</b></div><div class="breakLine"><span>キャッチミス</span><b>${fmt(o.catchMiss*f)}</b></div><div class="breakLine"><span>バイオレーション</span><b>${fmt(o.violation*f)}</b></div><div class="breakLine"><span>その他</span><b>${fmt(o.otherTo*f)}</b></div></div></div>`}
function home(){const p=player(); const list=state.stats.filter(s=>s.playerId===p?.id); const o=sumStats(list); return `<div class="card"><div class="sectionTitle"><div><h2>${p?`No.${p.number||''} ${p.name||''}`:'選手未選択'}</h2><div class="sub">1試合平均（全試合） <span class="pill">換算 ${fmt((o.q||0)/4)}試合</span></div></div></div>${statGrid(o,true)}<div style="height:10px"></div>${breakdowns(o,true)}</div>${state.user?'':'<div class="notice">ログインすると選手・試合・スタッツ登録ができます。</div>'}`}
function players(){return `<div class="card"><div class="sectionTitle"><h2>選手</h2>${state.user?'<button class="btn orange" id="newPlayer">＋選手登録</button>':''}</div>${state.players.map(p=>`<div class="listItem"><b>No.${p.number||''} ${p.name||''}</b><div class="sub">${p.position||''}</div>${state.user?`<div class="actions"><button class="btn ghost" onclick="editPlayer('${p.id}')">修正</button><button class="btn danger" onclick="deletePlayer('${p.id}')">削除</button></div>`:''}</div>`).join('')||'<div class="sub">選手データなし</div>'}</div>`}
window.editPlayer=async id=>{const p=state.players.find(x=>x.id===id)||{}; const name=prompt('選手名',p.name||''); if(!name)return; const number=prompt('番号',p.number||''); const position=prompt('ポジション',p.position||''); await setDoc(doc(db,'players',id),{name,number,position},{merge:true}); await load(); render()};
window.deletePlayer=async id=>{if(!confirm('削除しますか？'))return; await deleteDoc(doc(db,'players',id)); for(const s of state.stats.filter(x=>x.playerId===id)) await deleteDoc(doc(db,'stats',s.id)); await load(); render()};
function games(){return `<div class="card"><div class="sectionTitle"><h2>試合一覧</h2>${state.user?'<button class="btn orange" id="newGame">＋試合登録</button>':''}</div>${state.games.map(g=>gameItem(g)).join('')||'<div class="sub">試合データなし</div>'}</div>`}
function resultMark(g){const a=Number(g.teamScore),b=Number(g.oppScore); if(!Number.isFinite(a)||!Number.isFinite(b))return ''; return a>b?'○':a<b?'×':'△'}
function gameItem(g){return `<div class="listItem" onclick="showGameActions('${g.id}')"><div class="gameRow1"><span>${g.date||''}</span><span>${g.tournament||''}</span></div><div class="gameRow2"><span>vs ${g.opponent||''}</span><span>${g.quarters||0}Q ${resultMark(g)} ${g.teamScore||0}-${g.oppScore||0}</span></div><div class="actions hidden" id="actions_${g.id}" onclick="event.stopPropagation()"><button class="btn orange" onclick="openStatForm('${g.id}')">スタッツ登録</button><button class="btn ghost" onclick="editGame('${g.id}')">修正</button><button class="btn danger" onclick="deleteGame('${g.id}')">削除</button></div></div>`}
window.showGameActions=id=>document.getElementById('actions_'+id)?.classList.toggle('hidden');
function renderGameForm(id=''){const g=id?state.games.find(x=>x.id===id)||{}:{}; $('#view').innerHTML=`<div class="card"><h2>${id?'試合修正':'試合登録'}</h2><div class="formGrid"><div class="field"><label>年月日</label><input id="g_date" type="date" value="${g.date||''}"></div><div class="field"><label>Q数</label><input id="g_q" type="number" value="${g.quarters||4}"></div><div class="field wide"><label>対戦相手</label><input id="g_opp" value="${g.opponent||''}"></div><div class="field wide"><label>大会名</label><input id="g_tour" value="${g.tournament||''}"></div><div class="field"><label>自チーム得点</label><input id="g_ts" type="number" value="${g.teamScore||''}"></div><div class="field"><label>相手得点</label><input id="g_os" type="number" value="${g.oppScore||''}"></div><div class="wide"><button class="btn orange" id="saveGame">保存</button></div></div></div>`; $('#saveGame').onclick=async()=>{const gid=id||crypto.randomUUID(); await setDoc(doc(db,'games',gid),{date:$('#g_date').value,quarters:Number($('#g_q').value||0),opponent:$('#g_opp').value,tournament:$('#g_tour').value,teamScore:Number($('#g_ts').value||0),oppScore:Number($('#g_os').value||0)},{merge:true}); await load(); state.tab='games'; render()}}
window.editGame=id=>renderGameForm(id); window.deleteGame=async id=>{if(!confirm('試合と関連スタッツを削除しますか？'))return; await deleteDoc(doc(db,'games',id)); for(const s of state.stats.filter(x=>x.gameId===id)) await deleteDoc(doc(db,'stats',s.id)); await load(); render()};
window.openStatForm=(gameId)=>{state.selectedGameId=gameId; statForm()}
function statForm(){const g=state.games.find(x=>x.id===state.selectedGameId); const playerOptions=state.players.map(p=>`<option value="${p.id}" ${p.id===state.selectedPlayerId?'selected':''}>No.${p.number||''} ${p.name||''}</option>`).join(''); const existing=state.stats.find(s=>s.gameId===state.selectedGameId&&s.playerId===state.selectedPlayerId)||{}; const keys=['twoPa','twoPm','threePa','threePm','fta','ftm','ast','blk','passCut','dribbleSteal','or','dr','passMiss','dribbleMiss','catchMiss','violation','otherTo']; $('#view').innerHTML=`<div class="card"><div class="sectionTitle"><h2>スタッツ入力</h2><div class="sub">${g?`${g.date} vs ${g.opponent}`:''}</div></div><div class="field"><label>選手</label><select id="s_player">${playerOptions}</select></div><div class="formGrid">${keys.map(k=>`<div class="field"><label>${label(k)}</label><input id="${k}" type="number" value="${existing[k]||0}"></div>`).join('')}<div class="wide"><button class="btn orange" id="saveStat">保存</button></div></div></div>`; $('#s_player').onchange=()=>{state.selectedPlayerId=$('#s_player').value; localStorage.setItem('r32_selected_player',state.selectedPlayerId); statForm()}; $('#saveStat').onclick=async()=>{const pid=$('#s_player').value; const sid=`${state.selectedGameId}_${pid}`; const data={gameId:state.selectedGameId,playerId:pid}; keys.forEach(k=>data[k]=Number(document.getElementById(k).value||0)); await setDoc(doc(db,'stats',sid),data,{merge:true}); state.selectedPlayerId=pid; localStorage.setItem('r32_selected_player',pid); await load(); state.tab='stats'; render()}}
function label(k){return {twoPa:'2PA',twoPm:'2PM',threePa:'3PA',threePm:'3PM',fta:'FTA',ftm:'FTM',ast:'AST',blk:'BLK',passCut:'パスカット',dribbleSteal:'ドリブルカット',or:'オフェンスREB',dr:'ディフェンスREB',passMiss:'パスミス',dribbleMiss:'ドリブルミス',catchMiss:'キャッチミス',violation:'バイオレーション',otherTo:'その他TO'}[k]||k}
function statsView(){const pOpts=state.players.map(p=>`<option value="${p.id}" ${p.id===state.selectedPlayerId?'selected':''}>No.${p.number||''} ${p.name||''}</option>`).join(''); const targets=getTargets(); const list=filteredStats(); const o=sumStats(list); return `<div class="card"><div class="selectRow"><div class="field"><label>選手</label><select id="selPlayer">${pOpts}</select></div><div class="field"><label>対象</label><select id="selTarget">${targets.map(t=>`<option value="${t.value}" ${t.value===state.target?'selected':''}>${t.label}</option>`).join('')||'<option>対象データなし</option>'}</select></div></div><div class="actions"><button class="btn ghost" data-mode="game">試合</button><button class="btn ghost" data-mode="tournament">大会</button><button class="btn ghost" data-mode="day">日</button><button class="btn ghost" data-mode="month">月</button><button class="btn ghost" data-mode="year">年</button></div></div><div class="card"><div class="sectionTitle"><div><h2>${targetTitle()}</h2><div class="sub">1試合平均 <span class="pill">換算 ${fmt((o.q||0)/4)}試合</span></div></div></div>${statGrid(o,true)}<div style="height:10px"></div>${breakdowns(o,true)}</div>`}
function getTargets(){let arr=[]; if(state.mode==='game') arr=state.games.map(g=>({value:g.id,label:`${g.date} vs ${g.opponent}`})); if(state.mode==='tournament') arr=[...new Set(state.games.map(g=>g.tournament).filter(Boolean))].map(x=>({value:x,label:x})); if(state.mode==='day') arr=[...new Set(state.games.map(g=>g.date).filter(Boolean))].map(x=>({value:x,label:x})); if(state.mode==='month') arr=[...new Set(state.games.map(g=>String(g.date||'').slice(0,7)).filter(Boolean))].map(x=>({value:x,label:x})); if(state.mode==='year') arr=[...new Set(state.games.map(g=>String(g.date||'').slice(0,4)).filter(Boolean))].map(x=>({value:x,label:x})); if(arr.length&&!arr.find(x=>x.value===state.target)) state.target=arr[0].value; return arr}
function targetTitle(){const t=getTargets().find(x=>x.value===state.target); return t? t.label : '対象データなし'}
function settings(){return `<div class="card"><h2>設定</h2><div class="status">ログイン状態はログアウトするまで保持されます。パスワードは端末のパスワードマネージャーで保存できます。</div></div>`}
function render(){nav(); authButtons(); let html=''; if(state.tab==='home') html=home(); if(state.tab==='players') html=players(); if(state.tab==='games') html=games(); if(state.tab==='stats') html=statsView(); if(state.tab==='settings') html=settings(); $('#view').innerHTML=html; wire()}
function wire(){authButtons(); $('#newPlayer')&&($('#newPlayer').onclick=()=>editPlayer(crypto.randomUUID())); $('#newGame')&&($('#newGame').onclick=()=>renderGameForm()); $('#selPlayer')&&($('#selPlayer').onchange=()=>{state.selectedPlayerId=$('#selPlayer').value;localStorage.setItem('r32_selected_player',state.selectedPlayerId);render()}); $('#selTarget')&&($('#selTarget').onchange=()=>{state.target=$('#selTarget').value;render()}); document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{state.mode=b.dataset.mode;state.target='';render()})}
$('#cancelLogin').onclick=closeLogin; $('#submitLogin').onclick=submitLogin; $('#loginPassword').addEventListener('keydown',e=>{if(e.key==='Enter')submitLogin()}); $('#loginEmail').addEventListener('keydown',e=>{if(e.key==='Enter')$('#loginPassword').focus()}); await load(); render();
</script>
</body>
</html>
