<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#050b1e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="R32 Stats" />
  <title>R32 Basketball Stats</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="icons/icon-192.png" alt="R32" class="brand-icon" />
        <div>
          <div class="brand-title">R32 Basketball Stats</div>
          <div id="connectionStatus" class="brand-subtitle">クラウド接続を確認中...</div>
        </div>
      </div>
      <button id="authButton" class="pill-btn ghost">ログイン</button>
    </header>

    <main class="main">
      <section id="view-home" class="view active"></section>
      <section id="view-players" class="view"></section>
      <section id="view-games" class="view"></section>
      <section id="view-analysis" class="view"></section>
      <section id="view-videos" class="view"></section>
      <section id="view-settings" class="view"></section>
    </main>

    <nav class="bottom-nav" aria-label="main navigation">
      <button class="nav-item active" data-view="home"><span>🏠</span><small>ホーム</small></button>
      <button class="nav-item" data-view="players"><span>👤</span><small>選手</small></button>
      <button class="nav-item" data-view="games"><span>📝</span><small>試合</small></button>
      <button class="nav-item" data-view="analysis"><span>📊</span><small>スタッツ</small></button>
      <button class="nav-item" data-view="videos"><span>🎥</span><small>動画</small></button>
      <button class="nav-item" data-view="settings"><span>⚙️</span><small>設定</small></button>
    </nav>
  </div>

  <dialog id="authDialog" class="modal">
    <form method="dialog" class="modal-card" id="authForm">
      <button class="modal-close" value="cancel" aria-label="閉じる">×</button>
      <h2>管理者ログイン</h2>
      <p class="muted">入力・編集はログイン後に利用できます。閲覧だけならログイン不要です。</p>
      <label>メールアドレス<input id="loginEmail" type="email" autocomplete="email" required /></label>
      <label>パスワード<input id="loginPassword" type="password" autocomplete="current-password" required /></label>
      <button class="primary-btn" type="submit">ログイン</button>
      <p id="authMessage" class="form-message"></p>
    </form>
  </dialog>

  <template id="emptyTemplate">
    <div class="empty-card">
      <div class="empty-icon">🏀</div>
      <h3>まだデータがありません</h3>
      <p>管理者でログインして、選手と試合を登録してください。</p>
    </div>
  </template>

  <script type="module" src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js').catch(() => {}));
    }
  </script>
</body>
</html>
