<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#080b1f" />
  <title>R32 Basketball Stats</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="icons/icon-192.png" alt="R32" class="brand-icon" />
        <div>
          <h1>R32 Basketball Stats</h1>
          <p id="cloudStatus">クラウド接続確認中...</p>
        </div>
      </div>
      <button id="loginBtn" class="ghost-btn">ログイン</button>
    </header>

    <main class="content">
      <section id="homeView" class="view active"></section>
      <section id="playersView" class="view"></section>
      <section id="gamesView" class="view"></section>
      <section id="statsView" class="view"></section>
      <section id="videosView" class="view"></section>
      <section id="settingsView" class="view"></section>
    </main>

    <nav class="bottom-nav" aria-label="メインナビゲーション">
      <button data-view="home" class="active">🏠<span>ホーム</span></button>
      <button data-view="players">👤<span>選手</span></button>
      <button data-view="games">🏀<span>試合</span></button>
      <button data-view="stats">📊<span>スタッツ</span></button>
      <button data-view="videos">▶️<span>動画</span></button>
      <button data-view="settings">⚙️<span>設定</span></button>
    </nav>
  </div>

  <dialog id="loginDialog" class="dialog">
    <form method="dialog" class="dialog-card" id="loginForm">
      <h2>管理者ログイン</h2>
      <input id="email" type="email" placeholder="メールアドレス" autocomplete="email" />
      <input id="password" type="password" placeholder="パスワード" autocomplete="current-password" />
      <div class="dialog-actions">
        <button value="cancel" class="ghost-btn">閉じる</button>
        <button id="doLogin" value="default" class="primary-btn">ログイン</button>
      </div>
    </form>
  </dialog>

  <script type="module" src="js/app.js"></script>
</body>
</html>
