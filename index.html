<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyDiaAHF0iceYJNlSDKFKtHKnCETeMCW8IA",authDomain:"no32-player-stats.firebaseapp.com",projectId:"no32-player-stats",storageBucket:"no32-player-stats.firebasestorage.app",messagingSenderId:"934416639889",appId:"1:934416639889:web:cd0e319fa86c1acb3fdc30"};
const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app); await setPersistence(auth,browserLocalPersistence);
const state={user:null,tab:'home',players:[],games:[],stats:[],lastPlayerId:localStorage.getItem('r32_last_player')||'',statsMode:'game',targetId:'',categoryId:'',periodStart:'',periodEnd:'',selectedGameId:'',analysisReturn:null};
const nav=[['home','ホーム'],['players','選手'],['games','試合'],['stats','分析'],['team','チーム'],['settings','設定']];
const navIcons={home:'home',players:'person',games:'edit_note',stats:'bar_chart',team:'groups',settings:'settings'};
const $=s=>document.querySelector(s); const uid=()=>crypto.randomUUID();
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function navRender(){for(const id of ['pcNav','mobileNav']){const n=$('#'+id);n.innerHTML=nav.map(([k,v])=>`<button class="${state.tab===k?'active':''}" data-tab="${k}"><span class="material-symbols-outlined">${navIcons[k]}</span><span>${v}</span></button>`).join('');n.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()})}}
function sync(){onSnapshot(collection(db,'players'),s=>{state.players=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const ao=(a.sortOrder??999999),bo=(b.sortOrder??999999); if(ao!==bo)return ao-bo; return num(a.number)-num(b.number)||String(a.name||'').localeCompare(String(b.name||''))}); if(!state.lastPlayerId&&state.players[0]) state.lastPlayerId=state.players[0].id; render()});onSnapshot(collection(db,'games'),s=>{state.games=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const ao=(a.sortOrder??999999),bo=(b.sortOrder??999999); if(ao!==bo)return ao-bo; return (b.date||'').localeCompare(a.date||'')});render()});onSnapshot(collection(db,'stats'),s=>{state.stats=s.docs.map(d=>({id:d.id,...d.data()}));$('#cloudStatus').textContent='クラウド接続済み';render()})}
onAuthStateChanged(auth,u=>{state.user=u; $('#pcLoginBtn').textContent=u?'ログアウト':'管理者としてログイン'; syncOnce(); render()});let did=false;function syncOnce(){if(!did){did=true;sync()}}
$('#pcLoginBtn').onclick=()=>state.user?logout():loginModal();
function loginModal(){modal(`<h2>ログイン</h2><div class="grid"><label>メール<input id="loginEmail" autocomplete="username" type="email"></label><label>パスワード<input id="loginPass" autocomplete="current-password" type="password"></label><button class="btn" id="doLogin">ログイン</button><button class="btn ghost" id="closeModal">閉じる</button></div>`);$('#doLogin').onclick=async()=>{try{await signInWithEmailAndPassword(auth,$('#loginEmail').value,$('#loginPass').value);closeModal();toast('ログインしました')}catch(e){toast('ログイン失敗')}};$('#closeModal').onclick=closeModal}
async function logout(){await signOut(auth);toast('ログアウトしました')}
function modal(html){document.body.classList.remove('bg-login','bg-input');document.body.classList.add(html.includes('<h2>ログイン</h2>')?'bg-login':'bg-input');$('#modalRoot').innerHTML=`<div class="modal"><div class="card">${html}</div></div>`} function closeModal(){document.body.classList.remove('bg-login','bg-input');$('#modalRoot').innerHTML=''}
function requireLogin(){if(!state.user){toast('ログインが必要です');return false}return true}
function num(x){return Math.max(0,Number(x||0))} function pct(m,a){return num(a)?(num(m)/num(a)*100).toFixed(1)+'%':'0.0%'} function one(x,g){return g?(num(x)/g).toFixed(1):'0.0'}
function player(){return state.players.find(p=>p.id===state.lastPlayerId)||state.players[0]||null}
function playerStats(pid,items=state.stats){return items.filter(s=>s.playerId===pid)}
function gameStats(gid,pid){return state.stats.find(s=>s.gameId===gid&&s.playerId===pid)}
function sumStats(items){const r={q:0,twoPa:0,twoPm:0,threePa:0,threePm:0,fta:0,ftm:0,ast:0,blk:0,passCut:0,dribbleCut:0,stealOther:0,or:0,dr:0,passMiss:0,dribbleMiss:0,catchMiss:0,violation:0,otherTo:0};for(const s of items){const g=state.games.find(x=>x.id===s.gameId);r.q+=num(g?.quarters||s.quarters||0);for(const k in r) if(k!=='q') r[k]+=num(s[k])}return r}
function derived(r){const games=r.q/4 || 0; const fga=r.twoPa+r.threePa, fgm=r.twoPm+r.threePm, pts=r.twoPm*2+r.threePm*3+r.ftm, stl=r.passCut+r.dribbleCut+r.stealOther, reb=r.or+r.dr, to=r.passMiss+r.dribbleMiss+r.catchMiss+r.violation+r.otherTo;return{games,fga,fgm,pts,stl,reb,to}}
function resultMark(g){if(num(g.ownScore)>num(g.oppScore))return'<b class="result-win">○</b>'; if(num(g.ownScore)<num(g.oppScore))return'<b class="result-loss">×</b>'; return'<b class="result-draw">△</b>'}
function resultText(g){if(num(g.ownScore)>num(g.oppScore))return'<span class="result-win">○</span>'; if(num(g.ownScore)<num(g.oppScore))return'<span class="result-loss">×</span>'; return'<span class="result-draw">△</span>'}
function resultWord(g){if(num(g.ownScore)>num(g.oppScore))return'勝利'; if(num(g.ownScore)<num(g.oppScore))return'敗戦'; return'引分'}
function resultClass(g){if(num(g.ownScore)>num(g.oppScore))return'result-win'; if(num(g.ownScore)<num(g.oppScore))return'result-loss'; return'result-draw'}
function categories(){return [...new Set(state.games.map(g=>g.category).filter(Boolean))]}
function categoryGames(){return state.categoryId?state.games.filter(g=>(g.category||'')===state.categoryId):state.games}
function isMobileView(){return window.matchMedia&&window.matchMedia('(max-width:800px)').matches}
function targetGames(){let games=categoryGames();if(state.statsMode==='game') games=games.filter(g=>g.id===state.targetId); if(state.statsMode==='tournament') games=games.filter(g=>g.tournament===state.targetId); if(state.statsMode==='day') games=games.filter(g=>g.date===state.targetId); if(state.statsMode==='month') games=games.filter(g=>(g.date||'').slice(0,7)===state.targetId); if(state.statsMode==='year') games=games.filter(g=>(g.date||'').slice(0,4)===state.targetId); if(state.statsMode==='period') games=games.filter(g=>(!state.periodStart||g.date>=state.periodStart)&&(!state.periodEnd||g.date<=state.periodEnd)); return games}
function gameCard(g,cls='',draggable=false){return `<div class="list-item sortable-item ${cls}" draggable="false" data-game-id="${g.id}" onclick="openGameDetail('${g.id}')"><div class="game-line1"><span>${g.date||''}</span><span>${[g.tournament,g.category].filter(Boolean).join(' / ')}</span></div><div class="game-line2"><span>vs ${g.opponent||''}</span><span>${g.quarters||0}Q　${resultMark(g)} ${g.ownScore||0}-${g.oppScore||0}</span></div>${draggable&&state.user?'<button type="button" class="sort-handle game-sort-handle" draggable="false" aria-label="並び替え">≡</button>':''}</div>`}
function targetGameList(){if(!['game','tournament','day'].includes(state.statsMode))return '';const games=targetGames();return `<div class="card"><div class="section-title">集計対象試合一覧</div>${games.map(g=>gameCard(g)).join('')||'<p class="sub">対象試合なし</p>'}</div>`}
function numInput(id,value){return `<div class="num-wrap"><input type="number" min="0" id="${id}" value="${num(value)}"><div class="num-steps"><button type="button" data-step-for="${id}" data-delta="1">▲</button><button type="button" data-step-for="${id}" data-delta="-1">▼</button></div></div>`}
function statsGrid(r,per=true){const d=derived(r),g=per?d.games:1;return `<div class="stats-table">
  <div class="stats-row points-row">
    <div class="stats-cell key"><span>POINTS</span><b>${one(d.pts,g)}</b></div>
    <div class="stats-cell made"><span>2P成功</span><b>${one(r.twoPm,g)}</b></div>
    <div class="stats-cell made"><span>3P成功</span><b>${one(r.threePm,g)}</b></div>
    <div class="stats-cell made"><span>FT成功</span><b>${one(r.ftm,g)}</b></div>
  </div>
  <div class="stats-row triple"><div><span>2PA</span><b>${one(r.twoPa,g)}</b></div><div><span>2PM</span><b>${one(r.twoPm,g)}</b></div><div><span>2P%</span><b>${pct(r.twoPm,r.twoPa)}</b></div></div>
  <div class="stats-row triple"><div><span>3PA</span><b>${one(r.threePa,g)}</b></div><div><span>3PM</span><b>${one(r.threePm,g)}</b></div><div><span>3P%</span><b>${pct(r.threePm,r.threePa)}</b></div></div>
  <div class="stats-row triple fg-row"><div><span>FGA</span><b>${one(d.fga,g)}</b></div><div><span>FGM</span><b>${one(d.fgm,g)}</b></div><div><span>FG%</span><b>${pct(d.fgm,d.fga)}</b></div></div>
  <div class="stats-row triple"><div><span>FTA</span><b>${one(r.fta,g)}</b></div><div><span>FTM</span><b>${one(r.ftm,g)}</b></div><div><span>FT%</span><b>${pct(r.ftm,r.fta)}</b></div></div>
  <div class="stats-row dual"><div class="key"><span>AST</span><b>${one(r.ast,g)}</b></div><div class="key"><span>BLK</span><b>${one(r.blk,g)}</b></div></div>
</div>`}
function breakdown(title,total,arr,games){return `<div class="break-card break-count-${arr.length}"><div class="break-total"><span>${title}合計</span><b>${one(total,games)}</b></div>${arr.map(([lab,val])=>`<div class="break-item"><span>${lab}</span><b>${one(val,games)}</b></div>`).join('')}</div>`}
function toBreakdown(total,arr,games){return `<div class="break-card break-count-5 to-break"><div class="break-total"><span>TO合計</span><b>${one(total,games)}</b></div><div class="to-items">${arr.map(([lab,val])=>`<div class="break-item"><span>${lab}</span><b>${one(val,games)}</b></div>`).join('')}</div></div>`}

async function saveGameOrderFromDom(){
  if(!state.user) return;
  const ids=[...document.querySelectorAll('.game-sort-item')].map(el=>el.dataset.gameId).filter(Boolean);
  for(let i=0;i<ids.length;i++) await setDoc(doc(db,'games',ids[i]),{sortOrder:i,updatedAt:serverTimestamp()},{merge:true});
  toast('並び順を保存しました');
}
let activeSort=null, sortPressTimer=null;
function sortPoint(e){const t=e.touches?.[0]||e.changedTouches?.[0]||e;return{clientX:t.clientX,clientY:t.clientY}}
function bindSortHandle(handle,item,itemSelector,saveOrder){
  handle.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation()});
  handle.addEventListener('click',e=>{e.preventDefault();e.stopPropagation()});
  handle.addEventListener('pointerdown',e=>scheduleHandleSort(handle,item,itemSelector,saveOrder,e),{passive:false});
  handle.addEventListener('touchstart',e=>scheduleHandleSort(handle,item,itemSelector,saveOrder,e),{passive:false});
  handle.addEventListener('dragstart',e=>{e.preventDefault();e.stopPropagation()});
}
function scheduleHandleSort(handle,item,itemSelector,saveOrder,e){
  e.preventDefault();e.stopPropagation();if(activeSort||sortPressTimer)return;
  const startEvent=e;
  const clear=ev=>{if(ev){ev.preventDefault();ev.stopPropagation()}clearTimeout(sortPressTimer);sortPressTimer=null;document.removeEventListener('pointerup',clear);document.removeEventListener('touchend',clear);document.removeEventListener('touchcancel',clear)};
  sortPressTimer=setTimeout(()=>{document.removeEventListener('pointerup',clear);document.removeEventListener('touchend',clear);document.removeEventListener('touchcancel',clear);sortPressTimer=null;startHandleSort(handle,item,itemSelector,saveOrder,startEvent)},180);
  document.addEventListener('pointerup',clear,{passive:false});
  document.addEventListener('touchend',clear,{passive:false});
  document.addEventListener('touchcancel',clear,{passive:false});
}
function startHandleSort(handle,item,itemSelector,saveOrder,e){
  e.preventDefault();e.stopPropagation();if(activeSort)return;
  activeSort={item,itemSelector,saveOrder};item.classList.add('dragging');
  const move=ev=>{if(!activeSort)return;ev.preventDefault();const p=sortPoint(ev);const target=[...document.querySelectorAll(itemSelector)].find(el=>{const r=el.getBoundingClientRect();return p.clientY>=r.top&&p.clientY<=r.bottom});if(!target||target===item)return;const rect=target.getBoundingClientRect();const after=(p.clientY-rect.top)>rect.height/2;target.parentNode.insertBefore(item,after?target.nextSibling:target)};
  const end=ev=>{if(ev){ev.preventDefault();ev.stopPropagation()}document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',end);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',end);document.removeEventListener('touchcancel',end);item.classList.remove('dragging');const done=activeSort;activeSort=null;done.saveOrder()};
  document.addEventListener('pointermove',move,{passive:false});document.addEventListener('pointerup',end,{passive:false});document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',end,{passive:false});document.addEventListener('touchcancel',end,{passive:false});
}
function bindPlayerSorting(){
  if(!state.user) return;
  const items=[...document.querySelectorAll('.player-sort-item')];
  items.forEach(item=>{
    const handle=item.querySelector('.player-sort-handle');
    if(handle){bindSortHandle(handle,item,'.player-sort-item',savePlayerOrderFromDom)}
    item.addEventListener('dragover',e=>{e.preventDefault();const dragging=document.querySelector('.player-sort-item.dragging');if(!dragging||dragging===item)return;const rect=item.getBoundingClientRect();const after=(e.clientY-rect.top)>rect.height/2;item.parentNode.insertBefore(dragging,after?item.nextSibling:item)});
  });
}
async function savePlayerOrderFromDom(){
  if(!state.user) return;
  const ids=[...document.querySelectorAll('.player-sort-item')].map(el=>el.dataset.playerId).filter(Boolean);
  for(let i=0;i<ids.length;i++) await setDoc(doc(db,'players',ids[i]),{sortOrder:i,updatedAt:serverTimestamp()},{merge:true});
  toast('並び順を保存しました');
}
function bindNumberSteppers(){
  document.querySelectorAll('[data-step-for]').forEach(b=>b.onclick=e=>{e.preventDefault();const input=$('#'+b.dataset.stepFor);if(!input)return;input.value=Math.max(0,num(input.value)+Number(b.dataset.delta));input.dispatchEvent(new Event('input',{bubbles:true}))});
}

async function deletePlayerById(id){if(!requireLogin())return;await deleteDoc(doc(db,'players',id)); for(const s of state.stats.filter(x=>x.playerId===id)) await deleteDoc(doc(db,'stats',s.id))}
window.editPlayer=(id)=>playerForm(state.players.find(p=>p.id===id)); window.deletePlayer=async(id)=>{if(confirm('この選手を削除しますか？')){await deletePlayerById(id);toast('削除しました')}};
function playerForm(p={}){if(!requireLogin())return;modal(`<h2>${p.id?'選手修正':'選手登録'}</h2><div class="form-grid"><label>名前<input id="pName" value="${p.name||''}"></label><label>背番号<input id="pNum" value="${p.number||''}"></label><label>学年<input id="pGrade" value="${p.grade||''}"></label><label>ポジション<input id="pPos" value="${p.position||''}"></label></div><div class="row game-form-actions"><button class="btn" id="savePlayer">保存</button><button class="btn ghost" id="closeModal">閉じる</button>${p.id?'<button class="btn danger delete-right" id="deletePlayerFromEdit">削除</button>':''}</div>`);$('#savePlayer').onclick=async()=>{const id=p.id||uid();await setDoc(doc(db,'players',id),{name:$('#pName').value,number:$('#pNum').value,grade:$('#pGrade').value,position:$('#pPos').value,sortOrder:p.sortOrder??state.players.length,updatedAt:serverTimestamp()},{merge:true});closeModal();toast('保存しました')};$('#closeModal').onclick=closeModal;const del=$('#deletePlayerFromEdit');if(del)del.onclick=async()=>{if(confirm('この選手を削除しますか？')){await deletePlayerById(p.id);closeModal();toast('削除しました');render()}}}
function gameForm(g={}){if(!requireLogin())return;modal(`<h2>${g.id?'試合修正':'試合登録'}</h2><div class="form-grid game-form-grid"><label>年月日<input type="date" id="gDate" value="${g.date||''}"></label><label>Q数${numInput('gQ',g.quarters||4)}</label><label>カテゴリー<input id="gCategory" list="categoryList" value="${g.category||''}"><datalist id="categoryList"><option value="U15"><option value="U14"><option value="中学"><option value="高校"><option value="練習"></datalist></label><label>大会名<input id="gTour" value="${g.tournament||''}"></label><label>対戦相手<input id="gOpp" value="${g.opponent||''}"></label><label>自チーム得点${numInput('gOwn',g.ownScore||0)}</label><label>相手得点${numInput('gOppScore',g.oppScore||0)}</label></div><div class="row game-form-actions"><button class="btn" id="saveGame">保存</button><button class="btn ghost" id="closeModal">閉じる</button>${g.id?'<button class="btn danger delete-right" id="deleteGameFromEdit">削除</button>':''}</div>`);bindNumberSteppers();$('#saveGame').onclick=async()=>{const id=g.id||uid();await setDoc(doc(db,'games',id),{date:$('#gDate').value,quarters:num($('#gQ').value),category:$('#gCategory').value,tournament:$('#gTour').value,opponent:$('#gOpp').value,ownScore:num($('#gOwn').value),oppScore:num($('#gOppScore').value),sortOrder:g.sortOrder??state.games.length,updatedAt:serverTimestamp()},{merge:true});closeModal();toast('保存しました')};$('#closeModal').onclick=closeModal;const del=$('#deleteGameFromEdit');if(del)del.onclick=async()=>{if(!requireLogin())return;if(confirm('この試合と関連スタッツを削除しますか？')){await deleteDoc(doc(db,'games',g.id));for(const s of state.stats.filter(x=>x.gameId===g.id)) await deleteDoc(doc(db,'stats',s.id));closeModal();state.tab='games';state.selectedGameId='';toast('削除しました');render()}}}

window.goBackGames=()=>{state.tab='games';state.selectedGameId='';render()};
window.openGameForm=(id)=>{const g=state.games.find(x=>x.id===id); if(g) gameForm(g)};
window.openStatsForm=(gameId)=>statsForm(gameId);
window.gameActions=(id)=>{const g=state.games.find(x=>x.id===id);modal(`<h2>vs ${g.opponent||''}</h2><p class="sub">${g.date||''} ${g.tournament||''} ${resultMark(g)} ${g.ownScore||0}-${g.oppScore||0}</p><div class="grid"><button class="btn" id="statsReg">スタッツ登録</button><button class="btn ghost" id="editGame">試合修正</button><button class="btn danger" id="delGame">試合削除</button><button class="btn ghost" id="closeModal">閉じる</button></div>`);$('#statsReg').onclick=()=>statsForm(id);$('#editGame').onclick=()=>{closeModal();gameForm(g)};$('#delGame').onclick=async()=>{if(!requireLogin())return;if(confirm('この試合と関連スタッツを削除しますか？')){await deleteDoc(doc(db,'games',id));for(const s of state.stats.filter(x=>x.gameId===id)) await deleteDoc(doc(db,'stats',s.id));closeModal();toast('削除しました')}};$('#closeModal').onclick=closeModal}
function statsForm(gameId){if(!requireLogin())return;const g=state.games.find(x=>x.id===gameId);const existingForGame=state.stats.filter(x=>x.gameId===gameId);let defaultPid=state.lastPlayerId||'';if(defaultPid&&!state.players.some(p=>p.id===defaultPid)) defaultPid='';if(!defaultPid&&existingForGame[0]) defaultPid=existingForGame[0].playerId;if(!defaultPid&&state.players[0]) defaultPid=state.players[0].id;
modal(`<h2>スタッツ登録</h2><p class="sub">${g?`vs ${g.opponent||''}｜${g.date||''}｜${g.tournament||''}`:''}</p><label>選手<select id="sfPlayer">${state.players.map(p=>`<option value="${p.id}" ${p.id===defaultPid?'selected':''}>No.${p.number||''} ${p.name||''}</option>`).join('')}</select></label><div id="sfBody"></div><button class="btn" id="saveStats">保存</button><button class="btn ghost" id="closeModal">閉じる</button>`);
const load=()=>{const pid=$('#sfPlayer').value;state.lastPlayerId=pid;localStorage.setItem('r32_last_player',pid);const s=(state.stats.find(x=>x.gameId===gameId&&x.playerId===pid)||{});$('#sfBody').innerHTML=`<div class="form-grid stats-form-grid"><label>2PA${numInput('twoPa',s.twoPa)}</label><label>2PM${numInput('twoPm',s.twoPm)}</label><label>3PA${numInput('threePa',s.threePa)}</label><label>3PM${numInput('threePm',s.threePm)}</label><label>FTA${numInput('fta',s.fta)}</label><label>FTM${numInput('ftm',s.ftm)}</label><label>AST${numInput('ast',s.ast)}</label><label>BLK${numInput('blk',s.blk)}</label><label>パスカット${numInput('passCut',s.passCut)}</label><label>ドリブルカット${numInput('dribbleCut',s.dribbleCut)}</label><label class="wide-mobile">その他STL${numInput('stealOther',s.stealOther)}</label><label class="mobile-row-start">OR${numInput('or',s.or)}</label><label>DR${numInput('dr',s.dr)}</label><label class="mobile-row-start">パスミス${numInput('passMiss',s.passMiss)}</label><label>ドリブルミス${numInput('dribbleMiss',s.dribbleMiss)}</label><label class="mobile-row-start">キャッチミス${numInput('catchMiss',s.catchMiss)}</label><label>バイオレーション${numInput('violation',s.violation)}</label><label class="wide-mobile">その他TO${numInput('otherTo',s.otherTo)}</label></div><p class="sub">既に登録済みのスタッツがある場合は、その内容を表示しています。</p>`};$('#sfPlayer').onchange=load; load();bindNumberSteppers();$('#saveStats').onclick=async()=>{const pid=$('#sfPlayer').value;const id=`${gameId}_${pid}`;const keys=['twoPa','twoPm','threePa','threePm','fta','ftm','ast','blk','passCut','dribbleCut','stealOther','or','dr','passMiss','dribbleMiss','catchMiss','violation','otherTo'];const data={gameId,playerId:pid,quarters:g?.quarters||4,updatedAt:serverTimestamp()};keys.forEach(k=>data[k]=num($('#'+k).value));await setDoc(doc(db,'stats',id),data,{merge:true});state.lastPlayerId=pid;localStorage.setItem('r32_last_player',pid);closeModal();toast('保存しました')};$('#closeModal').onclick=closeModal}
render();
</script>
</body></html>
