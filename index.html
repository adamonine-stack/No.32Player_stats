<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>R32 Basketball Stats Ver.2.0</title>
  <meta name="theme-color" content="#080c1f" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="side-nav">
      <div class="brand">
        <div class="brand-icon">R32</div>
        <div><strong>R32</strong><span>Basketball Stats</span></div>
      </div>
      <button class="nav-btn active" data-view="home">🏠 ホーム</button>
      <button class="nav-btn" data-view="players">👤 選手</button>
      <button class="nav-btn" data-view="games">🏀 試合</button>
      <button class="nav-btn" data-view="analysis">📊 分析</button>
      <button class="nav-btn" data-view="videos">📹 動画</button>
      <button class="nav-btn" data-view="settings">⚙️ 設定</button>
      <div class="cloud-pill" id="cloudStatus">🟡 クラウド接続待機中</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">R32 Basketball Stats Ver.2.0</p>
          <h1 id="pageTitle">ホーム</h1>
        </div>
        <button class="ghost" id="loginBtn">ログイン</button>
      </header>

      <section id="home" class="view active">
        <div class="hero-card">
          <div>
            <p class="eyebrow">LAST SELECTED PLAYER</p>
            <h2 id="homePlayerName">選手未選択</h2>
            <p id="homePlayerMeta">分析画面で選手を選択するとホームに反映されます</p>
          </div>
          <button class="primary" id="goInputBtn">＋ 試合スタッツ入力</button>
        </div>
        <div class="stat-grid dashboard" id="homeDashboard"></div>
        <div class="panel">
          <div class="panel-head"><h3>最近の試合</h3><span>直近5試合</span></div>
          <div id="recentGames" class="match-list"></div>
        </div>
      </section>

      <section id="players" class="view">
        <div class="panel form-panel">
          <div class="panel-head"><h3>選手登録</h3><span>背番号・ポジション管理</span></div>
          <div class="form-grid">
            <input id="playerName" placeholder="選手名" />
            <input id="playerNo" placeholder="背番号" />
            <input id="playerPos" placeholder="ポジション PG/SG/SF..." />
            <input id="playerGrade" placeholder="学年" />
            <input id="playerHeight" placeholder="身長 cm" type="number" />
            <button class="primary" id="savePlayerBtn">選手を保存</button>
          </div>
        </div>
        <div class="panel"><div class="panel-head"><h3>選手一覧</h3></div><div id="playerList" class="card-list"></div></div>
      </section>

      <section id="games" class="view">
        <div class="panel">
          <div class="panel-head"><h3>登録済み試合一覧</h3><span>修正ボタンから再編集</span></div>
          <div id="gameList" class="match-list"></div>
        </div>
      </section>

      <section id="input" class="view">
        <div class="panel form-panel">
          <div class="panel-head"><h3 id="inputTitle">試合スタッツ入力</h3><button class="ghost" id="cancelEditBtn">一覧へ戻る</button></div>
          <div class="form-grid wide">
            <select id="statPlayer"></select>
            <input id="date" type="date" />
            <input id="opponent" placeholder="対戦校" />
            <input id="tournament" placeholder="大会名" />
            <input id="venue" placeholder="会場" />
            <input id="quarters" type="number" placeholder="Q数" value="4" />
            <input id="myScore" type="number" placeholder="自チーム得点" />
            <input id="oppScore" type="number" placeholder="相手得点" />
          </div>
          <h4>シュート</h4>
          <div class="form-grid stat-inputs">
            <input id="twopa" type="number" placeholder="2PA" /> <input id="twopm" type="number" placeholder="2PM" />
            <input id="threepa" type="number" placeholder="3PA" /> <input id="threepm" type="number" placeholder="3PM" />
            <input id="fta" type="number" placeholder="FTA" /> <input id="ftm" type="number" placeholder="FTM" />
          </div>
          <h4>その他</h4>
          <div class="form-grid stat-inputs">
            <input id="ast" type="number" placeholder="AST" />
            <input id="or" type="number" placeholder="OR" />
            <input id="dr" type="number" placeholder="DR" />
            <input id="pk" type="number" placeholder="PK パスカット" />
            <input id="ds" type="number" placeholder="DS ドリブルカット" />
            <input id="blk" type="number" placeholder="BLK" />
          </div>
          <h4>ターンオーバー</h4>
          <div class="form-grid stat-inputs">
            <input id="pm" type="number" placeholder="PM パスミス" />
            <input id="dm" type="number" placeholder="DM ドリブルミス" />
            <input id="cm" type="number" placeholder="CM キャッチミス" />
            <input id="vio" type="number" placeholder="VIO バイオレーション" />
            <input id="oth" type="number" placeholder="OTH その他" />
          </div>
          <button class="primary full" id="saveGameBtn">保存</button>
        </div>
      </section>

      <section id="analysis" class="view">
        <div class="panel analysis-controls">
          <select id="analysisPlayer"></select>
          <div class="segmented">
            <button class="active" data-scope="game">試合</button><button data-scope="tournament">大会</button><button data-scope="day">日</button><button data-scope="month">月</button><button data-scope="year">年</button>
          </div>
          <select id="analysisTarget"></select>
        </div>
        <div class="panel analysis-result">
          <div class="panel-head"><h3 id="analysisTitle">対象を選択してください</h3><span id="analysisSub"></span></div>
          <div id="targetMatches" class="match-list compact"></div>
          <div id="analysisStats" class="stat-grid dashboard"></div>
          <div id="analysisBreakdown" class="breakdown-grid"></div>
        </div>
      </section>

      <section id="videos" class="view">
        <div class="panel form-panel"><div class="panel-head"><h3>YouTubeリンク</h3></div><div class="form-grid"><input id="videoTitle" placeholder="タイトル" /><input id="videoUrl" placeholder="YouTube URL" /><button class="primary" id="saveVideoBtn">保存</button></div></div>
        <div class="panel"><div id="videoList" class="card-list"></div></div>
      </section>

      <section id="settings" class="view">
        <div class="panel"><h3>設定</h3><p id="settingsInfo">Firebase同期・バックアップ</p><button class="ghost" id="exportBtn">バックアップを書き出し</button></div>
      </section>
    </main>
  </div>
  <nav class="mobile-nav">
    <button class="nav-btn active" data-view="home">🏠<span>ホーム</span></button>
    <button class="nav-btn" data-view="players">👤<span>選手</span></button>
    <button class="nav-btn" data-view="games">🏀<span>試合</span></button>
    <button class="nav-btn" data-view="analysis">📊<span>分析</span></button>
    <button class="nav-btn" data-view="settings">⚙️<span>設定</span></button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
