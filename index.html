<style>
:root{--bg:#06101f;--panel:rgba(13,23,43,.86);--panel2:rgba(20,32,59,.88);--line:rgba(255,255,255,.10);--txt:#f8fafc;--muted:#9ca3af;--orange:#f97316;--purple:#b65cff;--green:#22c55e;--red:#ef4444;--yellow:#facc15;--radius:20px;--shadow:0 18px 50px rgba(0,0,0,.35)}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:radial-gradient(circle at 25% -10%,rgba(139,92,246,.28),transparent 32%),linear-gradient(180deg,#071126,#020617 62%);color:var(--txt);min-height:100vh}.app-bg:before{content:"";position:fixed;inset:0;background:url('assets/r32-brand.png') center 2vh/820px auto no-repeat;opacity:.16;filter:saturate(1.1);pointer-events:none}.app{position:relative;max-width:1400px;margin:0 auto;padding:18px 18px 96px}.layout{display:grid;grid-template-columns:260px 1fr;gap:20px}.sidebar{position:sticky;top:18px;height:calc(100vh - 36px);border:1px solid var(--line);background:linear-gradient(180deg,rgba(10,20,38,.92),rgba(7,17,38,.72));border-radius:28px;padding:18px;box-shadow:var(--shadow);overflow:hidden}.brand-art{height:175px;background:url('assets/r32-brand.png') center/cover no-repeat;border-radius:24px;margin-bottom:12px;filter:drop-shadow(0 12px 30px rgba(0,0,0,.45))}.brand h1{font-size:20px;margin:0}.brand p{font-size:12px;color:var(--muted);margin:4px 0 18px}.nav{display:grid;gap:10px}.nav button,.tabbar button{border:0;background:rgba(255,255,255,.06);color:var(--txt);padding:13px 14px;border-radius:16px;text-align:left;font-weight:800}.nav button.active,.tabbar button.active{background:linear-gradient(135deg,var(--purple),var(--orange));}.content{min-width:0}.mobile-hero{display:none}.topline{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:999px;padding:8px 12px;color:var(--muted);font-size:12px}.btn{border:0;border-radius:15px;background:linear-gradient(135deg,var(--purple),var(--orange));color:#fff;font-weight:900;padding:12px 16px;box-shadow:0 10px 24px rgba(249,115,22,.22)}.btn.ghost{background:rgba(255,255,255,.08);box-shadow:none}.btn.danger{background:linear-gradient(135deg,#ef4444,#f97316)}.btn.small{padding:8px 10px;border-radius:12px;font-size:12px}.card{border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(12px);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:14px}.grid{display:grid;gap:12px}.cols3{grid-template-columns:repeat(3,1fr)}.cols2{grid-template-columns:repeat(2,1fr)}.stat-card{background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:18px;padding:13px}.stat-label{font-size:12px;color:var(--muted);font-weight:900}.stat-value{font-size:25px;font-weight:1000;margin-top:3px}.accent{color:var(--purple)!important}.white{color:var(--txt)!important}.stat-label.accent{color:var(--purple)!important}.key-stat .stat-label,.key-stat .stat-value{color:var(--purple)!important}.made-stat .stat-label,.made-stat .stat-value{color:var(--txt)!important}.sub{font-size:12px;color:var(--muted)}.player-title{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}.player-name{font-size:28px;font-weight:1000}.section-title{font-size:15px;font-weight:1000;margin:4px 0 12px}.form-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}label{font-size:12px;color:var(--muted);font-weight:900}input,select{width:100%;background:rgba(2,6,23,.72);color:var(--txt);border:1px solid var(--line);border-radius:14px;padding:12px 12px;text-align:left}input[type=date]{text-align:left;min-width:0}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.list-item{border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:18px;padding:13px;margin-bottom:10px}.game-line1,.game-line2{display:flex;justify-content:space-between;gap:8px;align-items:center}.game-line1{font-size:12px;color:var(--muted);font-weight:800}.game-line2{font-weight:1000;margin-top:5px}.result-win{color:var(--green)}.result-loss{color:var(--red)}.result-draw{color:var(--yellow)}.detail-head{border-left:4px solid var(--orange);padding-left:12px}.breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px}.breakdown .box{border:1px solid var(--line);border-radius:14px;padding:10px;background:rgba(0,0,0,.18)}.breakdown .box b{display:block;font-size:18px;color:#fff}.breakdown .box span{font-size:11px;color:var(--muted)}.hidden{display:none!important}.tabbar{display:none}.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#111827;color:#fff;border:1px solid var(--line);padding:12px 14px;border-radius:999px;z-index:50;opacity:0;transition:.2s}.toast.show{opacity:1}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:grid;place-items:center;z-index:40;padding:18px}.modal .card{max-width:560px;width:100%;max-height:92vh;overflow:auto}.auth-actions{display:grid;gap:8px}.pc-only{display:block}.mobile-only{display:none}
@media(max-width:800px){.app{padding:0 12px 86px}.layout{display:block}.sidebar{display:none}.mobile-hero{display:block;height:190px;margin:0 -12px 8px;background:linear-gradient(180deg,rgba(2,6,23,.25),rgba(2,6,23,.96)),url('assets/r32-brand.png') center top/135% auto no-repeat;border-bottom:1px solid var(--line)}.content{margin-top:-70px}.topline{padding:0 2px}.card{border-radius:18px;padding:14px;margin-bottom:12px}.player-name{font-size:22px}.cols3{grid-template-columns:repeat(3,1fr);gap:8px}.cols2{grid-template-columns:repeat(2,1fr)}.stat-card{padding:10px;border-radius:15px}.stat-value{font-size:21px}.form-grid{grid-template-columns:repeat(2,1fr);gap:8px}.form-grid .wide{grid-column:1/-1}.tabbar{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:0;background:rgba(3,7,18,.94);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:7px 6px calc(7px + env(safe-area-inset-bottom));z-index:30}.tabbar button{font-size:11px;padding:9px 4px;text-align:center;border-radius:12px;background:transparent}.pc-only{display:none}.mobile-only{display:block}.breakdown{grid-template-columns:repeat(4,1fr);gap:6px}.breakdown .box{padding:8px}.breakdown .box b{font-size:16px}.login-home{width:100%}.auth-actions{margin-top:8px}.game-line1,.game-line2{font-size:12px}.game-line2{font-size:14px}.no-top-tap{height:28px}}

.stats-table{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:rgba(2,6,23,.32);margin-top:10px}.stats-row{display:grid;border-bottom:1px solid var(--line)}.stats-row:last-child{border-bottom:0}.stats-row>div,.stats-cell{padding:9px 10px;border-right:1px solid var(--line);min-width:0}.stats-row>div:last-child,.stats-cell:last-child{border-right:0}.points-row{grid-template-columns:1.05fr 1fr 1fr 1fr}.triple{grid-template-columns:1fr 1fr 1fr}.dual{grid-template-columns:1fr 1fr}.stats-row span,.stats-cell span{display:block;font-size:11px;color:var(--muted);font-weight:900}.stats-row b,.stats-cell b{display:block;font-size:20px;color:var(--txt);line-height:1.15}.stats-cell.key span,.stats-cell.key b,.stats-row .key span,.stats-row .key b,.stats-row.fg-row span,.stats-row.fg-row b{color:var(--purple)!important}.stats-cell.made span,.stats-cell.made b{color:var(--txt)!important}.break-wrap{display:grid;gap:10px}.break-card{display:grid;grid-template-columns:25.9259% repeat(5,1fr);border:1px solid var(--line);border-radius:16px;overflow:hidden;background:rgba(2,6,23,.28)}.break-card.break-count-2{grid-template-columns:25.9259% repeat(2,1fr)}.break-card.break-count-3{grid-template-columns:25.9259% repeat(3,1fr)}.break-card.to-break{grid-template-columns:25.9259% 1fr}.break-card>div{padding:9px 8px;border-right:1px solid var(--line);min-width:0}.break-card>div:last-child{border-right:0}.to-items{display:grid;grid-template-columns:repeat(3,1fr);padding:0!important;border-right:0!important}.to-items .break-item{padding:9px 8px;border-right:1px solid var(--line);min-width:0}.to-items .break-item:nth-child(3n){border-right:0}.to-items .break-item:nth-child(n+4){border-top:1px solid var(--line)}.break-card span{display:block;font-size:11px;color:var(--muted);font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.break-card b{display:block;font-size:18px;color:var(--txt)}.break-total span,.break-total b{color:var(--purple)!important}.game-detail-head{text-align:center}.game-detail-head h2{margin:8px 0;font-size:22px}
@media(max-width:800px){.points-row{grid-template-columns:1.05fr 1fr 1fr 1fr}.stats-row>div,.stats-cell{padding:8px 6px}.stats-row b,.stats-cell b{font-size:18px}.stats-row span,.stats-cell span{font-size:10px}.break-card{grid-template-columns:repeat(4,1fr)}.break-card.break-count-2,.break-card.break-count-5{width:75%;grid-template-columns:repeat(3,1fr)}.break-card.break-count-3{grid-template-columns:repeat(4,1fr)}.break-card.to-break{width:100%;grid-template-columns:25.9259% 1fr}.break-card.break-count-5:not(.to-break)>div:nth-child(3n){border-right:0}.break-card.break-count-5:not(.to-break)>div:nth-child(n+4){border-top:1px solid var(--line)}.break-card.break-count-5:not(.to-break)>div:last-child{border-right:1px solid var(--line)}.break-card>div{padding:8px 5px}.to-items .break-item{padding:8px 5px}.break-card span{font-size:9px}.break-card b{font-size:16px}}


/* Ver.3.2: REB内訳のOR/DR幅を統一 */
.break-card{grid-auto-columns:1fr}
.break-card .break-item{min-width:0}

.list-item[draggable="true"]{cursor:grab;touch-action:none}
.list-item.dragging{opacity:.55;outline:2px solid var(--purple)}
.sortable-item{position:relative;padding-right:48px}.sort-handle{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:28px;height:34px;display:grid;place-items:center;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.06);color:var(--muted);font-weight:900;cursor:grab;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-user-drag:none;touch-action:none}.sort-handle:active{cursor:grabbing}

.app-bg:before{background:url('assets/r32-bg-pc.svg') center/cover no-repeat;opacity:.22;filter:none}.app-bg:after{content:"";position:fixed;inset:0;background:url('assets/r32-brand.png') 28px 20px/min(15vw,220px) auto no-repeat;opacity:.20;filter:drop-shadow(0 18px 42px rgba(0,0,0,.65));pointer-events:none}.bg-dashboard.app-bg:before{opacity:.22}.bg-list.app-bg:before{opacity:.15}.bg-stats.app-bg:before,.bg-input.app-bg:before{opacity:.12}.bg-login.app-bg:before{opacity:.25}.bg-login.app-bg:after{opacity:.24}.bg-input.app-bg:after{opacity:.14}
@media(max-width:800px){.app-bg:before{background:url('assets/r32-bg-mobile.svg') center top/cover no-repeat;opacity:.20}.app-bg:after{background:url('assets/r32-brand.png') center 2vh/auto min(20vh,180px) no-repeat;opacity:.22}.bg-list.app-bg:before{opacity:.13}.bg-stats.app-bg:before,.bg-input.app-bg:before{opacity:.10}.bg-login.app-bg:before{opacity:.24}.mobile-hero{background:linear-gradient(180deg,rgba(9,9,9,.04),rgba(9,9,9,.92));border-bottom:1px solid var(--line)}}

<body class="app-bg">
<div class="app">
  <div class="mobile-hero"></div>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand-art"></div>
      <div class="brand"><h1>R32 Basketball Stats</h1><p>数字で成長を見える化</p></div>
      <nav class="nav" id="pcNav"></nav>
    </aside>
    <main class="content">
      <div class="topline pc-only"><span class="pill" id="cloudStatus">クラウド接続確認中</span><button class="btn ghost" id="pcLoginBtn">管理者としてログイン</button></div>
      <section id="view"></section>
    </main>
  </div>
</div>
<nav class="tabbar" id="mobileNav"></nav>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyDiaAHF0iceYJNlSDKFKtHKnCETeMCW8IA",authDomain:"no32-player-stats.firebaseapp.com",projectId:"no32-player-stats",storageBucket:"no32-player-stats.firebasestorage.app",messagingSenderId:"934416639889",appId:"1:934416639889:web:cd0e319fa86c1acb3fdc30"};
const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app); await setPersistence(auth,browserLocalPersistence);
const state={user:null,tab:'home',players:[],games:[],stats:[],lastPlayerId:localStorage.getItem('r32_last_player')||'',statsMode:'game',targetId:'',categoryId:'',periodStart:'',periodEnd:'',selectedGameId:''};
const nav=[['home','ホーム'],['players','選手'],['games','試合'],['stats','分析'],['settings','設定']];
const $=s=>document.querySelector(s); const uid=()=>crypto.randomUUID();
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function navRender(){for(const id of ['pcNav','mobileNav']){const n=$('#'+id);n.innerHTML=nav.map(([k,v])=>`<button class="${state.tab===k?'active':''}" data-tab="${k}">${v}</button>`).join('');n.querySelectorAll('button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()})}}
function sync(){onSnapshot(collection(db,'players'),s=>{state.players=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const ao=(a.sortOrder??999999),bo=(b.sortOrder??999999); if(ao!==bo)return ao-bo; return num(a.number)-num(b.number)||String(a.name||'').localeCompare(String(b.name||''))}); if(!state.lastPlayerId&&state.players[0]) state.lastPlayerId=state.players[0].id; render()});onSnapshot(collection(db,'games'),s=>{state.games=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const ao=(a.sortOrder??999999),bo=(b.sortOrder??999999); if(ao!==bo)return ao-bo; return (b.date||'').localeCompare(a.date||'')});render()});onSnapshot(collection(db,'stats'),s=>{state.stats=s.docs.map(d=>({id:d.id,...d.data()}));$('#cloudStatus').textContent='クラウド接続済み';render()})}
onAuthStateChanged(auth,u=>{state.user=u; $('#pcLoginBtn').textContent=u?'ログアウト':'管理者としてログイン'; syncOnce(); render()});let did=false;function syncOnce(){if(!did){did=true;sync()}}
$('#pcLoginBtn').onclick=()=>state.user?logout():loginModal();
function loginModal(){modal(`<h2>ログイン</h2><div class="grid"><label>メール<input id="loginEmail" autocomplete="username" type="email"></label><label>パスワード<input id="loginPass" autocomplete="current-password" type="password"></label><button class="btn" id="doLogin">ログイン</button><button class="btn ghost" id="closeModal">閉じる</button></div>`);$('#doLogin').onclick=async()=>{try{await signInWithEmailAndPassword(auth,$('#loginEmail').value,$('#loginPass').value);closeModal();toast('ログインしました')}catch(e){toast('ログイン失敗')}};$('#closeModal').onclick=closeModal}
async function logout(){await signOut(auth);toast('ログアウトしました')}
function modal(html){document.body.classList.remove('bg-login','bg-input');document.body.classList.add(html.includes('<h2>ログイン</h2>')?'bg-login':'bg-input');$('#modalRoot').innerHTML=`<div class="modal"><div class="card">${html}</div></div>`} function closeModal(){document.body.classList.remove('bg-login','bg-input');$('#modalRoot').innerHTML=''}
function requireLogin(){if(!state.user){toast('ログインが必要です');return false}return true}
function num(x){return Math.max(0,Number(x||0))} function pct(m,a){return num(a)?(num(m)/num(a)*100).toFixed(1)+'%':'0.0%'} function one(x,g){return g?(num(x)/g).toFixed(1):'0.0'}
function player(){return state.players.find(p=>p.id===state.lastPlayerId)||state.players[0]||null}
function playerStats(pid,items=state.stats){return items.filter(s=>s.playerId===pid)}
function gameStats(gid,pid){return state.stats.find(s=>s.gameId===gid&&s.playerId===pid)}
function sumStats(items){const r={q:0,twoPa:0,twoPm:0,threePa:0,threePm:0,fta:0,ftm:0,ast:0,blk:0,passCut:0,dribbleCut:0,stealOther:0,or:0,dr:0,passMiss:0,dribbleMiss:0,catchMiss:0,violation:0,otherTo:0};for(const s of items){const g=state.games.find(x=>x.id===s.gameId);r.q+=num(g?.quarters||s.quarters||0);for(const k in r) if(k!=='q') r[k]+=num(s[k])}return r}
function derived(r){const games=r.q/4 || 0; const fga=r.twoPa+r.threePa, fgm=r.twoPm+r.threePm, pts=r.twoPm*2+r.threePm*3+r.ftm, stl=r.passCut+r.dribbleCut+r.stealOther, reb=r.or+r.dr, to=r.passMiss+r.dribbleMiss+r.catchMiss+r.violation+r.otherTo;return{games,fga,fgm,pts,stl,reb,to}}
function resultMark(g){if(num(g.ownScore)>num(g.oppScore))return'<b class="result-win">○</b>'; if(num(g.ownScore)<num(g.oppScore))return'<b class="result-loss">×</b>'; return'<b class="result-draw">△</b>'}
function categories(){return [...new Set(state.games.map(g=>g.category).filter(Boolean))]}
function categoryGames(){return state.categoryId?state.games.filter(g=>(g.category||'')===state.categoryId):state.games}
function targetGames(){let games=(state.statsMode==='all'||state.statsMode==='period')?state.games:categoryGames();if(state.statsMode==='game') games=games.filter(g=>g.id===state.targetId); if(state.statsMode==='tournament') games=games.filter(g=>g.tournament===state.targetId); if(state.statsMode==='day') games=games.filter(g=>g.date===state.targetId); if(state.statsMode==='month') games=games.filter(g=>(g.date||'').slice(0,7)===state.targetId); if(state.statsMode==='year') games=games.filter(g=>(g.date||'').slice(0,4)===state.targetId); if(state.statsMode==='period') games=games.filter(g=>(!state.periodStart||g.date>=state.periodStart)&&(!state.periodEnd||g.date<=state.periodEnd)); return games}
function gameCard(g,cls='',draggable=false){return `<div class="list-item sortable-item ${cls}" draggable="false" data-game-id="${g.id}" onclick="openGameDetail('${g.id}')"><div class="game-line1"><span>${g.date||''}</span><span>${[g.tournament,g.category].filter(Boolean).join(' / ')}</span></div><div class="game-line2"><span>vs ${g.opponent||''}</span><span>${g.quarters||0}Q　${resultMark(g)} ${g.ownScore||0}-${g.oppScore||0}</span></div>${draggable&&state.user?'<button type="button" class="sort-handle game-sort-handle" draggable="false" aria-label="並び替え">≡</button>':''}</div>`}
function targetGameList(){if(!['game','tournament','day'].includes(state.statsMode))return '';const games=targetGames();return `<div class="card"><div class="section-title">集計対象試合一覧</div>${games.map(g=>gameCard(g)).join('')||'<p class="sub">対象試合なし</p>'}</div>`}
function numInput(id,value){return `<div class="num-wrap"><input type="number" min="0" id="${id}" value="${num(value)}"><div class="num-steps"><button type="button" data-step-for="${id}" data-delta="1">▲</button><button type="button" data-step-for="${id}" data-delta="-1">▼</button></div></div>`}
function statsGrid(r,per=true){const d=derived(r),g=per?d.games:1;return `<div class="stats-table">
  <div class="stats-row points-row">
    <div class="stats-cell key"><span>POINTS</span><b>${one(d.pts,g)}</b></div>
    <div class="stats-cell made"><span>2P成功</span><b>${one(r.twoPm,g)}</b></div>
    <div class="stats-cell made"><span>3P成功</span><b>${one(r.threePm,g)}</b></div>
    <div class="stats-cell made"><span>FT成功</span><b>${one(r.ftm,g)}</b></div>
  </div>
  <div class="stats-row triple"><div><span>2PA</span><b>${one(r.twoPa,g)}</b></div><div><span>2PM</span><b>${one(r.twoPm,g)}</b></div><div><span>2P%</span><b>${pct(r.twoPm,r.twoPa)}</b></div></div>
  <div class="stats-row triple"><div><span>3PA</span><b>${one(r.threePa,g)}</b></div><div><span>3PM</span><b>${one(r.threePm,g)}</b></div><div><span>3P%</span><b>${pct(r.threePm,r.threePa)}</b></div></div>

let activeSort=null, sortPressTimer=null;
function sortPoint(e){const t=e.touches?.[0]||e.changedTouches?.[0]||e;return{clientX:t.clientX,clientY:t.clientY}}
function bindSortHandle(handle,item,itemSelector,saveOrder){
  handle.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation()});
  handle.addEventListener('click',e=>{e.preventDefault();e.stopPropagation()});
  handle.addEventListener('pointerdown',e=>scheduleHandleSort(handle,item,itemSelector,saveOrder,e),{passive:false});
  handle.addEventListener('touchstart',e=>scheduleHandleSort(handle,item,itemSelector,saveOrder,e),{passive:false});
  handle.addEventListener('dragstart',e=>{e.preventDefault();e.stopPropagation()});
}
function scheduleHandleSort(handle,item,itemSelector,saveOrder,e){
  e.preventDefault();e.stopPropagation();if(activeSort||sortPressTimer)return;
  const startEvent=e;
  const clear=ev=>{if(ev){ev.preventDefault();ev.stopPropagation()}clearTimeout(sortPressTimer);sortPressTimer=null;document.removeEventListener('pointerup',clear);document.removeEventListener('touchend',clear);document.removeEventListener('touchcancel',clear)};
  sortPressTimer=setTimeout(()=>{document.removeEventListener('pointerup',clear);document.removeEventListener('touchend',clear);document.removeEventListener('touchcancel',clear);sortPressTimer=null;startHandleSort(handle,item,itemSelector,saveOrder,startEvent)},180);
  document.addEventListener('pointerup',clear,{passive:false});
  document.addEventListener('touchend',clear,{passive:false});
  document.addEventListener('touchcancel',clear,{passive:false});
}
function startHandleSort(handle,item,itemSelector,saveOrder,e){
  e.preventDefault();e.stopPropagation();if(activeSort)return;
  activeSort={item,itemSelector,saveOrder};item.classList.add('dragging');
  const move=ev=>{if(!activeSort)return;ev.preventDefault();const p=sortPoint(ev);const target=[...document.querySelectorAll(itemSelector)].find(el=>{const r=el.getBoundingClientRect();return p.clientY>=r.top&&p.clientY<=r.bottom});if(!target||target===item)return;const rect=target.getBoundingClientRect();const after=(p.clientY-rect.top)>rect.height/2;target.parentNode.insertBefore(item,after?target.nextSibling:target)};
  const end=ev=>{if(ev){ev.preventDefault();ev.stopPropagation()}document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',end);document.removeEventListener('touchmove',move);document.removeEventListener('touchend',end);document.removeEventListener('touchcancel',end);item.classList.remove('dragging');const done=activeSort;activeSort=null;done.saveOrder()};
  document.addEventListener('pointermove',move,{passive:false});document.addEventListener('pointerup',end,{passive:false});document.addEventListener('touchmove',move,{passive:false});document.addEventListener('touchend',end,{passive:false});document.addEventListener('touchcancel',end,{passive:false});
}

window.gameActions=(id)=>{const g=state.games.find(x=>x.id===id);modal(`<h2>vs ${g.opponent||''}</h2><p class="sub">${g.date||''} ${g.tournament||''} ${resultMark(g)} ${g.ownScore||0}-${g.oppScore||0}</p><div class="grid"><button class="btn" id="statsReg">スタッツ登録</button><button class="btn ghost" id="editGame">試合修正</button><button class="btn danger" id="delGame">試合削除</button><button class="btn ghost" id="closeModal">閉じる</button></div>`);$('#statsReg').onclick=()=>statsForm(id);$('#editGame').onclick=()=>{closeModal();gameForm(g)};$('#delGame').onclick=async()=>{if(!requireLogin())return;if(confirm('この試合と関連スタッツを削除しますか？')){await deleteDoc(doc(db,'games',id));for(const s of state.stats.filter(x=>x.gameId===id)) await deleteDoc(doc(db,'stats',s.id));closeModal();toast('削除しました')}};$('#closeModal').onclick=closeModal}
function statsForm(gameId){if(!requireLogin())return;const g=state.games.find(x=>x.id===gameId);const existingForGame=state.stats.filter(x=>x.gameId===gameId);let defaultPid=state.lastPlayerId||'';if(defaultPid&&!state.players.some(p=>p.id===defaultPid)) defaultPid='';if(!defaultPid&&existingForGame[0]) defaultPid=existingForGame[0].playerId;if(!defaultPid&&state.players[0]) defaultPid=state.players[0].id;
modal(`<h2>スタッツ登録</h2><p class="sub">${g?`vs ${g.opponent||''}｜${g.date||''}｜${g.tournament||''}`:''}</p><label>選手<select id="sfPlayer">${state.players.map(p=>`<option value="${p.id}" ${p.id===defaultPid?'selected':''}>No.${p.number||''} ${p.name||''}</option>`).join('')}</select></label><div id="sfBody"></div><button class="btn" id="saveStats">保存</button><button class="btn ghost" id="closeModal">閉じる</button>`);
const load=()=>{const pid=$('#sfPlayer').value;state.lastPlayerId=pid;localStorage.setItem('r32_last_player',pid);const s=(state.stats.find(x=>x.gameId===gameId&&x.playerId===pid)||{});$('#sfBody').innerHTML=`<div class="form-grid"><label>2PA${numInput('twoPa',s.twoPa)}</label><label>2PM${numInput('twoPm',s.twoPm)}</label><label>3PA${numInput('threePa',s.threePa)}</label><label>3PM${numInput('threePm',s.threePm)}</label><label>FTA${numInput('fta',s.fta)}</label><label>FTM${numInput('ftm',s.ftm)}</label><label>AST${numInput('ast',s.ast)}</label><label>BLK${numInput('blk',s.blk)}</label><label>パスカット${numInput('passCut',s.passCut)}</label><label>ドリブルカット${numInput('dribbleCut',s.dribbleCut)}</label><label>その他STL${numInput('stealOther',s.stealOther)}</label><label>OR${numInput('or',s.or)}</label><label>DR${numInput('dr',s.dr)}</label><label>パスミス${numInput('passMiss',s.passMiss)}</label><label>ドリブルミス${numInput('dribbleMiss',s.dribbleMiss)}</label><label>キャッチミス${numInput('catchMiss',s.catchMiss)}</label><label>バイオレーション${numInput('violation',s.violation)}</label><label>その他TO${numInput('otherTo',s.otherTo)}</label></div><p class="sub">既に登録済みのスタッツがある場合は、その内容を表示しています。</p>`};$('#sfPlayer').onchange=load; load();bindNumberSteppers();$('#saveStats').onclick=async()=>{const pid=$('#sfPlayer').value;const id=`${gameId}_${pid}`;const keys=['twoPa','twoPm','threePa','threePm','fta','ftm','ast','blk','passCut','dribbleCut','stealOther','or','dr','passMiss','dribbleMiss','catchMiss','violation','otherTo'];const data={gameId,playerId:pid,quarters:g?.quarters||4,updatedAt:serverTimestamp()};keys.forEach(k=>data[k]=num($('#'+k).value));await setDoc(doc(db,'stats',id),data,{merge:true});state.lastPlayerId=pid;localStorage.setItem('r32_last_player',pid);closeModal();toast('保存しました')};$('#closeModal').onclick=closeModal}
render();
</script>
</body></html>
